<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASR カメラ</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ASRカメラ">
  <style>
    body {
      font-family: sans-serif; font-size: 16px; margin: 0; background: #fff;
      padding: 12px;
      padding-top:    max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-left:   max(12px, env(safe-area-inset-left));
      padding-right:  max(12px, env(safe-area-inset-right));
    }
    h1 { font-size: 20px; margin: 8px 0 16px; }
    h2 { font-size: 17px; background: #2e7d45; color: #fff; padding: 8px 12px; margin: 20px -12px 12px; }
    label { display: block; font-weight: bold; margin: 10px 0 4px; font-size: 15px; }
    input[type=text] {
      display: block; width: 100%; font-size: 16px;
      padding: 10px; box-sizing: border-box;
      color: #000; background: #fff;
      border: 2px solid #333; border-radius: 4px;
    }

    /* ── Drive リンク ── */
    #drive-link-area {
      display: none; padding: 10px 12px; margin: 0 0 8px;
      background: #e8f5ec; border: 1px solid #a5d6a7; border-radius: 6px;
    }
    .drive-link-label { font-size: 13px; font-weight: bold; color: #1a5c2a; }
    #drive-link { display: block; font-size: 13px; color: #1565c0; word-break: break-all; margin-top: 3px; }

    /* ── モードボタン ── */
    .mode-btns { display: flex; gap: 8px; margin-bottom: 16px; }
    .mode-btn {
      flex: 1; font-size: 16px; font-weight: bold;
      padding: 14px 8px;
      background: #f5f5f5; color: #555;
      border: 2px solid #ddd; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    .mode-btn.active { background: #1a5c2a; color: #fff; border-color: #1a5c2a; }

    .count-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .count-badge { font-size: 13px; font-weight: bold; padding: 4px 12px; border-radius: 12px; }

    /* ── 撮影ボタン ── */
    .cam-btn {
      display: block; width: 100%;
      font-size: 20px; font-weight: bold;
      padding: 22px; margin: 0 0 8px;
      background: #2e7d45; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }
    .cam-btn:active { background: #1a5c2a; }

    /* ── 写真グリッド ── */
    .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .photo-item { position: relative; width: 120px; }
    .photo-item img {
      width: 120px; height: 120px; object-fit: cover;
      border: 1px solid #aaa; border-radius: 4px; display: block; cursor: pointer;
    }
    .photo-status {
      position: absolute; top: 3px; left: 3px;
      font-size: 10px; font-weight: bold; padding: 2px 5px;
      border-radius: 3px; line-height: 1.4; display: none;
    }
    .photo-status.uploading { background: rgba(0,0,0,0.65); color: #fff; }
    .photo-status.done      { background: rgba(26,92,42,0.85); color: #fff; }
    .photo-status.error     { background: rgba(192,57,43,0.85); color: #fff; }
    .photo-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.6); color: #fff;
      font-size: 10px; padding: 3px 5px;
      border-radius: 0 0 4px 4px; line-height: 1.5;
    }
    .photo-mode-badge {
      display: inline-block; font-size: 10px; font-weight: bold;
      padding: 1px 5px; border-radius: 3px; margin-bottom: 1px;
    }
    .photo-del {
      position: absolute; top: 0; right: 0;
      width: 32px; height: 32px;
      background: rgba(200,0,0,0.85); color: #fff;
      border: none; border-radius: 0 4px 0 6px;
      font-size: 16px; font-weight: bold; line-height: 32px; text-align: center;
      cursor: pointer; -webkit-appearance: none; padding: 0;
    }
    .no-photo { color: #999; font-size: 14px; margin: 4px 0 12px; }

    /* ── 送信ボタン ── */
    .send-btn {
      display: block; width: 100%;
      font-size: 17px; font-weight: bold;
      padding: 16px; margin: 8px 0;
      background: #1e8e3e; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }
    .send-btn:disabled { background: #90a4ae; cursor: not-allowed; }
    #send-msg {
      display: none; font-size: 14px; font-weight: bold; text-align: center;
      padding: 8px 12px; border-radius: 6px; margin-bottom: 8px;
    }
    #send-msg.ok  { background: #e8f5ec; color: #1a5c2a; border: 1px solid #a5d6a7; }
    #send-msg.err { background: #fdecea; color: #c0392b; border: 1px solid #ef9a9a; }
  </style>
</head>
<body>

<h1>ASR カメラ</h1>

<!-- ── Drive フォルダリンク（アップロード成功後に表示） ── -->
<div id="drive-link-area">
  <span class="drive-link-label">📁 Drive フォルダ（共有リンク）</span>
  <a id="drive-link" href="#" target="_blank"></a>
</div>

<!-- ── 現場情報 ── -->
<h2>現場情報</h2>
<label for="site-name">現場名 <span style="font-weight:normal;font-size:12px;color:#888;">（Drive保存先フォルダ名）</span></label>
<input type="text" id="site-name" placeholder="例：○○太陽光発電所">

<!-- ── モード選択 ── -->
<h2>モード選択</h2>
<div class="mode-btns">
  <button class="mode-btn active" id="btn-before" type="button" onclick="setMode('作業前')">作業前</button>
  <button class="mode-btn"        id="btn-after"  type="button" onclick="setMode('作業後')">作業後</button>
  <button class="mode-btn"        id="btn-check"  type="button" onclick="setMode('点検')">点検</button>
</div>
<div class="count-row">
  <span class="count-badge" id="cnt-before" style="background:#dce8ff;color:#1565c0;">作業前: 0枚</span>
  <span class="count-badge" id="cnt-after"  style="background:#fff3e0;color:#e65100;">作業後: 0枚</span>
  <span class="count-badge" id="cnt-check"  style="background:#f3e5f5;color:#6a1b9a;">点検: 0枚</span>
</div>

<!-- ── 撮影ボタン ── -->
<input type="file" id="cam-input" accept="image/*" capture="environment"
       style="display:none" onchange="onCapture(this)">
<button class="cam-btn" type="button"
        onclick="document.getElementById('cam-input').click()">
  📷 撮影（<span id="current-mode-label">作業前</span>）
</button>

<!-- ── 撮影済み写真 ── -->
<h2>撮影済み写真</h2>
<div id="photo-grid" class="photo-grid">
  <p class="no-photo" id="no-photo-msg">まだ写真がありません</p>
</div>

<!-- ── スプレッドシート送信 ── -->
<h2>スプレッドシート送信</h2>
<button class="send-btn" id="send-btn" type="button" onclick="sendToSheet()">
  📊 スプレッドシートに送信
</button>
<div id="send-msg"></div>

<script>
/* ======================================================
   設定
   ====================================================== */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxtnLLUlzeMgubyjW4fY9g2Cf2O2yS_P_p1mSOyaXlYUyrul1xm_tDCXVrl-PB3fqYw/exec';

/* ======================================================
   状態変数
   ====================================================== */
var currentMode    = '作業前';
var photos         = [];   /* {id, mode, datetime, src} */
var photoId        = 0;
var dateFolderLink = null;

var MODE_CFG = {
  '作業前': { btnId: 'btn-before', cntId: 'cnt-before', bg: '#1565c0' },
  '作業後': { btnId: 'btn-after',  cntId: 'cnt-after',  bg: '#e65100' },
  '点検':   { btnId: 'btn-check',  cntId: 'cnt-check',  bg: '#6a1b9a' }
};

/* ======================================================
   モード切り替え
   ====================================================== */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('current-mode-label').textContent = mode;
  Object.keys(MODE_CFG).forEach(function(m) {
    document.getElementById(MODE_CFG[m].btnId).classList.toggle('active', m === mode);
  });
}

/* ======================================================
   撮影 → EXIF 読み取り → サムネイル表示 → GAS アップロード
   ====================================================== */
function onCapture(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var mode = currentMode;
  var now  = new Date();

  readExifDate(file, function(exifDate) {
    var datetime = exifDate || formatDatetime(now);
    var id       = ++photoId;
    var src      = URL.createObjectURL(file);

    photos.push({ id: id, mode: mode, datetime: datetime, src: src });
    renderPhoto({ id: id, mode: mode, datetime: datetime, src: src });
    updateCounts();

    /* 圧縮してGASにアップロード */
    compressImage(file, function(blob) {
      uploadViaGAS(id, blob, mode);
    });
  });
  input.value = '';
}

/* ======================================================
   写真を圧縮（Canvas、最大1920px・JPEG 0.75）
   ====================================================== */
function compressImage(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img    = new Image();
    img.onload = function() {
      var MAX   = 1920;
      var scale = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
      var w     = Math.round(img.naturalWidth  * scale);
      var h     = Math.round(img.naturalHeight * scale);
      var canvas = document.createElement('canvas');
      canvas.width  = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(function(blob) { callback(blob); }, 'image/jpeg', 0.75);
    };
    img.onerror = function() { callback(file); }; /* 画像読み込み失敗時は原寸で送信 */
    img.src = e.target.result;
  };
  reader.onerror = function() { callback(file); };
  reader.readAsDataURL(file);
}

/* ======================================================
   GAS に POST して Drive に保存
   Content-Type: text/plain で CORS プリフライトを回避しつつ
   レスポンスを読み取れる形式で送信する
   ====================================================== */
function uploadViaGAS(id, blob, mode) {
  showStatus(id, 'uploading', '⬆ アップロード中');

  var reader = new FileReader();
  reader.onload = function(e) {
    var base64   = e.target.result.replace(/^data:[^;]+;base64,/, '');
    var siteName = (document.getElementById('site-name').value.trim()) || '未設定';
    var today    = formatDate(new Date());

    var payload = JSON.stringify({
      type:      'camera_photo',
      imageData: base64,
      mimeType:  'image/jpeg',
      filename:  formatDatetimeFile(new Date()) + '.jpg',
      mode:      mode,
      siteName:  siteName,
      date:      today
    });

    var controller = new AbortController();
    var timer = setTimeout(function() { controller.abort(); }, 60000);

    fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    payload,
      signal:  controller.signal
    })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(result) {
      clearTimeout(timer);
      if (result.status !== 'ok') throw new Error(result.message || 'error');
      showStatus(id, 'done', '✅ 完了');
      if (result.link) {
        dateFolderLink = result.link;
        var area = document.getElementById('drive-link-area');
        var link = document.getElementById('drive-link');
        area.style.display = '';
        link.href           = result.link;
        link.textContent    = result.link;
      }
    })
    .catch(function(err) {
      clearTimeout(timer);
      console.error('Upload error:', err);
      showStatus(id, 'error', '❌ 失敗');
    });
  };
  reader.onerror = function() { showStatus(id, 'error', '❌ 読取失敗'); };
  reader.readAsDataURL(blob);
}

/* ======================================================
   サムネイル表示・ステータス表示・削除
   ====================================================== */
function renderPhoto(p) {
  var noMsg = document.getElementById('no-photo-msg');
  if (noMsg) noMsg.style.display = 'none';

  var item = document.createElement('div');
  item.className = 'photo-item';
  item.id = 'photo-' + p.id;

  var img = document.createElement('img');
  img.src = p.src;
  img.onclick = (function(s) { return function() { window.open(s, '_blank'); }; })(p.src);

  var status = document.createElement('div');
  status.id        = 'photo-status-' + p.id;
  status.className = 'photo-status uploading';
  status.textContent = '⬆ 圧縮中';
  status.style.display = '';

  var cfg  = MODE_CFG[p.mode] || { bg: '#333' };
  var meta = document.createElement('div');
  meta.className = 'photo-meta';
  meta.innerHTML =
    '<span class="photo-mode-badge" style="background:' + cfg.bg + ';">' + p.mode + '</span><br>' +
    p.datetime;

  var del = document.createElement('button');
  del.className  = 'photo-del';
  del.type       = 'button';
  del.textContent = '×';
  del.onclick = (function(xid) { return function() { removePhoto(xid); }; })(p.id);

  item.appendChild(img);
  item.appendChild(status);
  item.appendChild(meta);
  item.appendChild(del);
  document.getElementById('photo-grid').appendChild(item);
}

function showStatus(id, cls, text) {
  var el = document.getElementById('photo-status-' + id);
  if (!el) return;
  el.className     = 'photo-status ' + cls;
  el.textContent   = text;
  el.style.display = '';
}

function removePhoto(id) {
  photos = photos.filter(function(p) { return p.id !== id; });
  var el = document.getElementById('photo-' + id);
  if (el) el.remove();
  updateCounts();
  if (photos.length === 0) {
    var noMsg = document.getElementById('no-photo-msg');
    if (noMsg) noMsg.style.display = '';
  }
}

function updateCounts() {
  var counts = { '作業前': 0, '作業後': 0, '点検': 0 };
  photos.forEach(function(p) { if (p.mode in counts) counts[p.mode]++; });
  document.getElementById('cnt-before').textContent = '作業前: ' + counts['作業前'] + '枚';
  document.getElementById('cnt-after').textContent  = '作業後: ' + counts['作業後'] + '枚';
  document.getElementById('cnt-check').textContent  = '点検: '   + counts['点検']   + '枚';
}

/* ======================================================
   日付・時刻フォーマット
   ====================================================== */
function formatDate(d) {
  return d.getFullYear() + '-' +
    ('0' + (d.getMonth() + 1)).slice(-2) + '-' +
    ('0' + d.getDate()).slice(-2);
}
function formatDatetime(d) {
  return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 ' +
    ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
}
function formatDatetimeFile(d) {
  return d.getFullYear() +
    ('0' + (d.getMonth() + 1)).slice(-2) +
    ('0' + d.getDate()).slice(-2) + '_' +
    ('0' + d.getHours()).slice(-2) +
    ('0' + d.getMinutes()).slice(-2) +
    ('0' + d.getSeconds()).slice(-2);
}

/* ======================================================
   EXIF 撮影日時読み取り（index.html と同一実装）
   ====================================================== */
function readExifDate(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var buf  = e.target.result;
      var view = new DataView(buf);
      if (view.getUint16(0) !== 0xFFD8) { callback(null); return; }
      var offset = 2;
      while (offset < buf.byteLength - 4) {
        var marker = view.getUint16(offset);
        offset += 2;
        if (marker === 0xFFE1) {
          var segLen = view.getUint16(offset);
          if (view.getUint32(offset + 2) === 0x45786966 && view.getUint16(offset + 6) === 0x0000) {
            var ts      = offset + 8;
            var le      = (view.getUint16(ts) === 0x4949);
            var ifd     = ts + view.getUint32(ts + 4, le);
            var n       = view.getUint16(ifd, le);
            var dateStr = null;
            var exifPtr = null;
            for (var i = 0; i < n; i++) {
              var ep  = ifd + 2 + i * 12;
              var tag = view.getUint16(ep, le);
              if (tag === 0x8769) { exifPtr = ts + view.getUint32(ep + 8, le); }
              if (tag === 0x0132) {
                var vo = ts + view.getUint32(ep + 8, le);
                var s  = '';
                for (var j = 0; j < 19; j++) {
                  var ch = view.getUint8(vo + j); if (!ch) break;
                  s += String.fromCharCode(ch);
                }
                dateStr = s;
              }
            }
            if (exifPtr) {
              var ne = view.getUint16(exifPtr, le);
              for (var i2 = 0; i2 < ne; i2++) {
                var ep2  = exifPtr + 2 + i2 * 12;
                var tag2 = view.getUint16(ep2, le);
                if (tag2 === 0x9003) {
                  var vo2 = ts + view.getUint32(ep2 + 8, le);
                  var s2  = '';
                  for (var j2 = 0; j2 < 19; j2++) {
                    var ch2 = view.getUint8(vo2 + j2); if (!ch2) break;
                    s2 += String.fromCharCode(ch2);
                  }
                  dateStr = s2; break;
                }
              }
            }
            if (dateStr) {
              var m = dateStr.match(/^(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2})/);
              if (m) {
                callback(m[1] + '年' + parseInt(m[2]) + '月' + parseInt(m[3]) + '日 ' +
                         m[4] + ':' + m[5]);
                return;
              }
            }
          }
          offset += segLen;
        } else if (marker === 0xFFDA) {
          break;
        } else {
          if (offset + 2 > buf.byteLength) break;
          offset += view.getUint16(offset);
        }
      }
      callback(null);
    } catch (ex) { callback(null); }
  };
  reader.onerror = function() { callback(null); };
  reader.readAsArrayBuffer(file.slice(0, 65536));
}

/* ======================================================
   スプレッドシート送信（camera_asr サマリーを送信）
   ====================================================== */
function sendToSheet() {
  var btn = document.getElementById('send-btn');
  var msg = document.getElementById('send-msg');

  if (photos.length === 0) {
    msg.textContent   = '写真がありません';
    msg.className     = 'err';
    msg.style.display = 'block';
    return;
  }

  btn.disabled      = true;
  btn.textContent   = '送信中...';
  msg.style.display = 'none';
  msg.className     = '';

  var counts = { '作業前': 0, '作業後': 0, '点検': 0 };
  photos.forEach(function(p) { if (p.mode in counts) counts[p.mode]++; });

  var payload = JSON.stringify({
    type:        'camera_asr',
    siteName:    (document.getElementById('site-name').value.trim()) || '',
    driveLink:   dateFolderLink || '',
    countBefore: counts['作業前'],
    countAfter:  counts['作業後'],
    countCheck:  counts['点検'],
    totalCount:  photos.length
  });

  var controller = new AbortController();
  var timer = setTimeout(function() { controller.abort(); }, 15000);

  fetch(GAS_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body:    payload,
    signal:  controller.signal
  })
  .then(function() {
    clearTimeout(timer);
    msg.textContent   = '✅ 送信しました！';
    msg.className     = 'ok';
  })
  .catch(function() {
    clearTimeout(timer);
    msg.textContent   = '❌ 送信に失敗しました';
    msg.className     = 'err';
  })
  .finally(function() {
    btn.disabled      = false;
    btn.textContent   = '📊 スプレッドシートに送信';
    msg.style.display = 'block';
  });
}
</script>
</body>
</html>
