<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>除草作業 完了報告書</title>

  <!-- ===== PWA: iPhoneホーム画面アプリ化 ===== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="除草報告書">
  <link rel="apple-touch-icon" id="touch-icon">
  <!-- Web App Manifest（Android / Chrome 対応） -->
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%E9%99%A4%E8%8D%89%E4%BD%9C%E6%A5%AD%20%E5%AE%8C%E4%BA%86%E5%A0%B1%E5%91%8A%E6%9B%B8%22%2C%22short_name%22%3A%22%E9%99%A4%E8%8D%89%E5%A0%B1%E5%91%8A%E6%9B%B8%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22theme_color%22%3A%22%231a5c2a%22%2C%22background_color%22%3A%22%23ffffff%22%7D">
  <style>
    /* ===== 共通 ===== */
    body {
      font-family: sans-serif; font-size: 16px; margin: 0; background: #fff;
      padding: 12px;
      padding-top:    max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-left:   max(12px, env(safe-area-inset-left));
      padding-right:  max(12px, env(safe-area-inset-right));
    }
    h1 { font-size: 20px; margin: 8px 0 16px; }
    h2 { font-size: 17px; background: #2e7d45; color: #fff; padding: 8px 12px; margin: 20px -12px 12px; }
    h3 { font-size: 16px; color: #1a5c2a; border-left: 4px solid #2e7d45; padding-left: 8px; margin: 14px 0 6px; }
    label { display: block; font-weight: bold; margin: 10px 0 4px; font-size: 16px; }
    input[type=text],
    input[type=date],
    input[type=password],
    textarea {
      display: block; width: 100%; font-size: 16px;
      padding: 10px; box-sizing: border-box;
      border: 1px solid #aaa; border-radius: 4px; background: #fff;
    }
    textarea { min-height: 80px; resize: vertical; }
    input[type=file] { display: block; font-size: 16px; margin: 8px 0; width: 100%; }

    /* ===== ログイン画面 ===== */
    #view-login {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100svh; padding: 24px; box-sizing: border-box;
    }
    .login-box {
      width: 100%; max-width: 360px;
      background: #f8fdf9; border: 1px solid #b2d8bc;
      border-radius: 12px; padding: 32px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .login-box .logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-box .logo-icon {
      font-size: 48px; display: block; margin-bottom: 6px;
    }
    .login-box .logo-title {
      font-size: 18px; font-weight: bold; color: #1a5c2a;
    }
    .login-box .logo-sub {
      font-size: 13px; color: #666; margin-top: 4px;
    }
    .login-btn {
      display: block; width: 100%;
      font-size: 17px; font-weight: bold;
      padding: 14px; margin-top: 16px;
      background: #1a5c2a; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
      box-sizing: border-box;
    }
    .login-btn:active { background: #144821; }
    #login-error {
      display: none; color: #c0392b;
      font-size: 14px; text-align: center;
      margin-top: 12px; font-weight: bold;
    }
    #logged-user-badge {
      display: none;
      font-size: 13px; color: #555; text-align: right;
      margin-bottom: 4px;
    }

    /* ===== 看板写真タップヒント ===== */
    .sign-wrap { position: relative; display: inline-block; cursor: pointer; }
    .sign-wrap .tap-hint {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: 11px; text-align: center; padding: 4px 2px;
      border-radius: 0 0 4px 4px; pointer-events: none;
    }
    #img-modal { display: none; }
    #img-modal.open { display: flex; }
    .modal-field-row { display:flex;align-items:center;gap:8px;margin-bottom:5px; }
    .modal-label { color:#90A4AE;font-size:11px;width:38px;flex-shrink:0;text-align:right; }
    .modal-input {
      flex:1;padding:6px 8px;font-size:14px;
      background:#263238;color:#fff;
      border:1px solid #455A64;border-radius:6px;
      -webkit-appearance:none;box-sizing:border-box;
    }
    .modal-input::placeholder { color:#546E7A; }
    @keyframes field-flash {
      0%   { background:#43A047; border-color:#81C784; }
      100% { background:#263238; border-color:#455A64; }
    }
    .modal-input.flashing { animation: field-flash 0.9s ease-out forwards; }

    /* ===== 看板テキスト貼り付けエリア ===== */
    .paste-box {
      border: 2px dashed #f9a825; border-radius: 8px;
      padding: 12px 14px; margin: 10px 0 4px; background: #fffdf0;
    }
    .paste-box textarea {
      min-height: 90px; font-size: 14px; background: #fff;
      border-color: #ddd; margin-top: 4px;
    }
    .parse-btn {
      display: block; width: 100%;
      font-size: 15px; font-weight: bold;
      padding: 12px; margin-top: 8px;
      background: #f9a825; color: #fff;
      border: none; border-radius: 6px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }
    .field-highlight { background: #fffde7 !important; transition: background 0.3s; }

    /* ===== 現場スペックグループ ===== */
    .spec-group {
      border: 2px solid #2e7d45; border-radius: 8px;
      padding: 12px 14px; margin: 8px 0 16px;
      background: #f4fbf6;
    }
    .spec-group-title {
      font-size: 13px; font-weight: bold; color: #2e7d45;
      margin: 0 0 8px; letter-spacing: 0.05em;
    }
    .spec-group label { margin-top: 8px; }
    .spec-group label:first-of-type { margin-top: 0; }

    /* ===== エリアヘッダー ===== */
    .area-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #2e7d45; color: #fff; padding: 8px 12px; margin: 20px -12px 12px;
    }
    .area-header span { font-size: 17px; font-weight: bold; }
    .area-del-btn {
      font-size: 13px; padding: 4px 10px;
      background: #fff; color: #c0392b;
      border: 1px solid #c0392b; border-radius: 4px;
      cursor: pointer; -webkit-appearance: none; white-space: nowrap;
    }
    .add-area-btn {
      display: block; width: 100%;
      font-size: 17px; font-weight: bold;
      padding: 16px; margin: 8px 0 24px;
      background: #e8f5ec; color: #1a5c2a;
      border: 2px dashed #2e7d45; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }

    /* ===== フォームの写真プレビュー ===== */
    .prev { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 10px; }
    .prev-item { position: relative; display: inline-block; }
    .prev img { width: 120px; height: 120px; object-fit: cover; border: 1px solid #aaa; border-radius: 4px; display: block; }
    .prev-del {
      position: absolute; top: 0; right: 0;
      width: 44px; height: 44px;
      background: rgba(200,0,0,0.85); color: #fff;
      border: none; border-radius: 0 4px 0 6px;
      font-size: 20px; font-weight: bold; line-height: 44px; text-align: center;
      cursor: pointer; -webkit-appearance: none; padding: 0;
    }

    /* ===== 生成ボタン ===== */
    .gen-btn {
      display: block; width: 100%;
      font-size: 20px; font-weight: bold;
      padding: 22px; margin: 24px 0;
      background: #1a5c2a; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }

    /* ===== 完了バナー ===== */
    #done-banner {
      display: none;
      background: #1a6ed8; color: #fff;
      font-size: 16px; font-weight: bold;
      padding: 16px; text-align: center;
      line-height: 1.7;
      position: sticky; top: 0; z-index: 100;
    }
    #back-btn {
      display: none;
      font-size: 15px; padding: 10px 20px;
      background: #fff; color: #1a5c2a;
      border: 2px solid #1a5c2a; border-radius: 6px;
      cursor: pointer; -webkit-appearance: none;
      margin: 12px 0;
    }

    /* ===== 報告書ビュー ===== */
    #view-report { display: none; max-width: 720px; margin: 0 auto; padding: 0 8px 40px; }

    #view-report h1 { font-size: 22px; text-align: center; margin: 20px 0 4px; }
    #view-report .r-client { text-align: center; color: #555; margin-bottom: 20px; font-size: 15px; }

    #view-report table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    #view-report th, #view-report td { border: 1px solid #aaa; padding: 8px 10px; font-size: 15px; vertical-align: top; }
    #view-report th { background: #e8f5ec; width: 36%; white-space: nowrap; }

    #view-report .r-h2 {
      font-size: 16px; font-weight: bold;
      background: #2e7d45; color: #fff;
      padding: 8px 12px; margin: 24px 0 12px;
    }
    #view-report .r-h3 {
      font-size: 15px; color: #1a5c2a;
      border-left: 4px solid #2e7d45; padding-left: 8px;
      margin: 14px 0 6px;
    }

    #view-report .r-photos { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 12px; }
    #view-report .r-photos img { width: 140px; height: 140px; object-fit: cover; border: 1px solid #aaa; border-radius: 4px; }
    #view-report .no-photo { color: #999; font-size: 14px; margin: 4px 0 12px; }

    #view-report .r-notes {
      border: 1px solid #ccc; border-radius: 4px;
      padding: 10px 12px; background: #fafafa;
      font-size: 15px; white-space: pre-wrap; min-height: 40px;
      margin-bottom: 12px;
    }

    /* A4印刷用 */
    @media print {
      #done-banner, #back-btn { display: none !important; }
      body { padding: 0; margin: 0; }
      #view-report { max-width: 100%; padding: 0; }
      #view-report .r-h2 {
        background: #2e7d45 !important; color: #fff !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="view-login">
  <div class="login-box">
    <div class="logo">
      <span class="logo-icon" id="login-icon">🌿</span>
      <div class="logo-title">除草作業 完了報告書</div>
      <div class="logo-sub">ログインしてください</div>
    </div>
    <label for="login-pass">パスワード</label>
    <input type="password" id="login-pass" placeholder="パスワードを入力" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div id="login-error">パスワードが正しくありません</div>
  </div>
</div>

<!-- ===== 完了バナー（生成後に表示） ===== -->
<div id="done-banner">
  【完了】この画面をスクリーンショット、またはブラウザの共有メニューから PDF 保存してください
</div>

<!-- ===== フォームビュー ===== -->
<div id="view-form" style="display:none;">

  <div id="logged-user-badge"></div>
  <h1>除草作業 完了報告書</h1>

  <h2>基本情報</h2>
  <label>案件名</label>
  <input type="text" id="f-project" placeholder="例：○○住宅地 除草管理作業">

  <div class="spec-group">
    <p class="spec-group-title">▼ 現場スペック（看板OCRで自動入力）</p>
    <label>① 名称（現場名称）</label>
    <input type="text" id="f-name" placeholder="例：○○太陽光発電所">
    <label>② 工番（設備ID / 管理番号）</label>
    <input type="text" id="f-jobno" placeholder="例：JOB-2026-001">
    <label>③ 所在地（施工地・現場所在地）</label>
    <input type="text" id="f-location" placeholder="例：○○県○○市○○町1-2-3">
  </div>

  <label>提出先（クライアント名）</label>
  <input type="text" id="f-client" placeholder="例：合同会社 SUNDAY driver &amp; co.">
  <label>作業日</label>
  <input type="date" id="f-date">
  <label>天候 / 気温</label>
  <input type="text" id="f-weather" placeholder="例：晴れ / 22℃">
  <label>作業時間帯</label>
  <input type="text" id="f-time" placeholder="例：08:30 〜 15:00">
  <label>作業人数</label>
  <input type="text" id="f-workers" placeholder="例：3名">
  <label>担当者名（ログイン名）</label>
  <input type="text" id="f-staff" placeholder="例：山田 太郎" readonly style="background:#f0f8f0;">

  <h2>看板写真</h2>
  <div id="prev-sign" class="prev"></div>
  <input type="file" id="sign" accept="image/*" onchange="onSignUpload(this)">

  <div class="paste-box">
    <label style="margin:0 0 4px;">看板の文字をここに貼り付け</label>
    <textarea id="sign-paste" placeholder="スマホのテキスト認識でコピーした文字をそのまま貼り付けてください..." onpaste="setTimeout(parsePastedText, 80)" onchange="parsePastedText()"></textarea>
    <button type="button" class="parse-btn" onclick="parsePastedText()">↓ 名称・工番・所在地に自動振り分け</button>
  </div>

  <div id="areas-container"></div>
  <button type="button" class="add-area-btn" onclick="addArea()">＋ エリアを追加</button>

  <h2>全体所見 / 除草剤 / 提案 / 備考</h2>
  <label>全体所見・気づいた点</label>
  <textarea id="f-overview" placeholder="全エリアまとめての所見"></textarea>
  <h3>除草剤使用記録（散布状況写真）</h3>
  <div id="prev-figh" class="prev"></div>
  <input type="file" id="figh" accept="image/*" multiple onchange="preview(this)">
  <label>薬剤名・濃度・散布量など</label>
  <textarea id="f-herbicide" placeholder="例：ラウンドアップ 50倍希釈 各エリア 2L"></textarea>
  <h3>次回作業の提案（提案箇所写真）</h3>
  <div id="prev-figp" class="prev"></div>
  <input type="file" id="figp" accept="image/*" multiple onchange="preview(this)">
  <label>次回提案内容</label>
  <textarea id="f-proposal" placeholder="例：次回推奨は6月上旬"></textarea>
  <label>備考・連絡事項</label>
  <textarea id="f-remarks" placeholder="例：散布後2時間は立入禁止"></textarea>
  <label>iCloud 共有リンク URL（任意）</label>
  <input type="text" id="f-icloud" placeholder="https://www.icloud.com/photos/...">

  <!-- 生成ボタン -->
  <input type="button" class="gen-btn" value="報告書を生成" onclick="generateReport()">

</div><!-- /view-form -->


<!-- ===== 報告書ビュー（生成後に表示） ===== -->
<input type="button" id="back-btn" value="← 入力画面に戻る" onclick="backToForm()">
<div id="view-report"></div>


<!-- ===== 拡大モーダル ===== -->
<div id="img-modal" style="position:fixed;inset:0;z-index:1000;background:#111;flex-direction:column;">

  <!-- ① ヒント（上部） -->
  <div style="flex-shrink:0;padding:7px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;">
    <span style="color:#78909C;font-size:12px;">文字を長押し選択 → ボタンで振り分け　または直接入力</span>
    <button onclick="closeModal()" style="font-size:13px;font-weight:bold;color:#fff;background:#c62828;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;white-space:nowrap;-webkit-appearance:none;">完了</button>
  </div>

  <!-- ② 写真（flex:1 で残りスペースを占有、キーボード表示時は自動縮小） -->
  <div id="modal-photo-wrap" style="flex:1;min-height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;padding:4px;">
    <img id="modal-img" src="" style="max-width:100%;max-height:100%;object-fit:contain;display:block;user-select:text;-webkit-user-select:text;">
  </div>

  <!-- ③ 振り分けバー（テキスト選択時のみ表示） -->
  <div id="modal-sel-bar" style="display:none;flex-shrink:0;background:#263238;padding:7px 10px;border-top:1px solid #37474F;">
    <div style="color:#78909C;font-size:11px;margin-bottom:5px;">選択中：<span id="modal-sel-preview" style="color:#FFE082;font-weight:bold;"></span></div>
    <div style="display:flex;gap:6px;">
      <button onclick="sendToField('f-name')"     style="flex:1;padding:9px 4px;font-size:13px;font-weight:bold;background:#1565C0;color:#fff;border:none;border-radius:7px;cursor:pointer;">📌 名称</button>
      <button onclick="sendToField('f-jobno')"    style="flex:1;padding:9px 4px;font-size:13px;font-weight:bold;background:#2E7D32;color:#fff;border:none;border-radius:7px;cursor:pointer;">🔢 工番</button>
      <button onclick="sendToField('f-location')" style="flex:1;padding:9px 4px;font-size:13px;font-weight:bold;background:#6A1B9A;color:#fff;border:none;border-radius:7px;cursor:pointer;">📍 所在地</button>
    </div>
  </div>

  <!-- ④ 入力フィールド（写真直下・直接入力可・メインフィールドに即時反映） -->
  <div style="flex-shrink:0;background:#1C2833;padding:8px 12px 6px;border-top:2px solid #37474F;">
    <div style="color:#546E7A;font-size:10px;margin-bottom:5px;letter-spacing:0.5px;">▼ 入力内容は元の画面に自動反映されます</div>
    <div class="modal-field-row">
      <label class="modal-label" style="color:#42A5F5;">名称</label>
      <input id="modal-f-name"     type="text" class="modal-input" placeholder="写真を見ながら直接入力できます"
             oninput="syncModalField('f-name',this.value)"
             onfocus="onModalInputFocus(this)" onblur="onModalInputBlur()">
    </div>
    <div class="modal-field-row">
      <label class="modal-label" style="color:#66BB6A;">工番</label>
      <input id="modal-f-jobno"    type="text" class="modal-input" placeholder="例: ABC-1234"
             oninput="syncModalField('f-jobno',this.value)"
             onfocus="onModalInputFocus(this)" onblur="onModalInputBlur()">
    </div>
    <div class="modal-field-row">
      <label class="modal-label" style="color:#AB47BC;">所在地</label>
      <input id="modal-f-location" type="text" class="modal-input" placeholder="例: 岡山県〇〇市〇〇町"
             oninput="syncModalField('f-location',this.value)"
             onfocus="onModalInputFocus(this)" onblur="onModalInputBlur()">
    </div>
  </div>

  <!-- ⑤ 完了ボタン（親指エリア・入力中は非表示） -->
  <div id="modal-done-wrap" style="flex-shrink:0;padding:6px 12px 10px;background:#1C2833;">
    <button onclick="closeModal()" style="width:100%;padding:13px;font-size:16px;font-weight:bold;background:#c62828;color:#fff;border:none;border-radius:10px;cursor:pointer;-webkit-appearance:none;">完了（閉じる）</button>
  </div>
</div>

<!-- ===== JavaScript ===== -->
<script>
/* =====================================================
   パスワード管理
   外注先を追加するときはここにエントリーを足すだけ：
   { pass: "パスワード", name: "表示名" }
   ===================================================== */
var USERS = [
  { pass: "1step2026", name: "管理者" }
  /* 追加例：
  ,{ pass: "gaityuu2026", name: "外注先A" }
  ,{ pass: "partner9999", name: "外注先B" }
  */
];

/* ログイン処理 */
function doLogin() {
  var input = document.getElementById('login-pass').value;
  var matched = null;
  for (var i = 0; i < USERS.length; i++) {
    if (USERS[i].pass === input) { matched = USERS[i]; break; }
  }
  if (!matched) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }
  /* ログイン成功 */
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-form').style.display  = 'block';
  document.getElementById('f-staff').value            = matched.name;
  var badge = document.getElementById('logged-user-badge');
  badge.textContent = 'ログイン中：' + matched.name;
  badge.style.display = 'block';
  initLocalStorage();
}

/* ===== 看板写真（拡大モーダル対応） ===== */
function onSignUpload(input) {
  var box = document.getElementById('prev-sign');
  box.innerHTML = '';
  if (!input.files.length) return;

  var src  = URL.createObjectURL(input.files[0]);
  var wrap = document.createElement('div');
  wrap.className = 'prev-item sign-wrap';

  var img = document.createElement('img');
  img.src = src;
  img.title = 'タップして拡大';
  img.onclick = function() { openModal(src); };

  var hint = document.createElement('div');
  hint.className = 'tap-hint';
  hint.textContent = '🔍 タップして拡大・文字コピー';

  var btn = document.createElement('button');
  btn.className = 'prev-del';
  btn.textContent = '×';
  btn.onclick = function() {
    if (!confirm('リセットしてよろしいですか？\n看板写真と現場スペックの入力内容をすべて消去します。')) return;
    wrap.remove();
    resetSiteFields();
  };

  wrap.appendChild(img);
  wrap.appendChild(hint);
  wrap.appendChild(btn);
  box.appendChild(wrap);
}

function openModal(src) {
  document.getElementById('modal-img').src = src;
  /* モーダルの入力欄に現在値を同期 */
  ['name', 'jobno', 'location'].forEach(function(k) {
    var main   = document.getElementById('f-' + k);
    var mirror = document.getElementById('modal-f-' + k);
    if (main && mirror) mirror.value = main.value;
  });
  document.getElementById('img-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.addEventListener('selectionchange', onModalSelection);
  /* キーボード表示時にモーダルを可視領域に追従させる */
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', onViewportResize);
    window.visualViewport.addEventListener('scroll', onViewportResize);
  }
}

function closeModal() {
  document.removeEventListener('selectionchange', onModalSelection);
  if (window.visualViewport) {
    window.visualViewport.removeEventListener('resize', onViewportResize);
    window.visualViewport.removeEventListener('scroll', onViewportResize);
  }
  var modal = document.getElementById('img-modal');
  modal.style.top = '';
  modal.style.height = '';
  hideSelBar();
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

/* visualViewport: キーボード出現時にモーダルを可視領域に縮める */
function onViewportResize() {
  var vv    = window.visualViewport;
  var modal = document.getElementById('img-modal');
  if (!modal.classList.contains('open')) return;
  modal.style.top    = vv.offsetTop + 'px';
  modal.style.height = vv.height + 'px';
}

/* モーダル内フィールドの手入力 → メインフィールドへ即時反映 */
function syncModalField(mainId, value) {
  var el = document.getElementById(mainId);
  if (el) { el.value = value; el.dispatchEvent(new Event('input')); }
}

/* キーボード表示中: 完了ボタンを隠して写真エリアを最小化 */
function onModalInputFocus(input) {
  document.getElementById('modal-done-wrap').style.display = 'none';
  /* フォーカスした入力欄を見えるようにスクロール（Androidなど向け） */
  setTimeout(function() {
    input.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 150);
}

/* キーボード閉じた後: 完了ボタンを再表示 */
function onModalInputBlur() {
  setTimeout(function() {
    document.getElementById('modal-done-wrap').style.display = '';
    /* モーダルサイズをリセット */
    var modal = document.getElementById('img-modal');
    modal.style.top    = '';
    modal.style.height = '';
  }, 200);
}

/* テキスト選択を監視してバーを表示／非表示 */
function onModalSelection() {
  var modal = document.getElementById('img-modal');
  if (!modal.classList.contains('open')) return;
  var sel = window.getSelection();
  var txt = sel ? sel.toString().trim() : '';
  if (txt.length > 0) {
    var preview = txt.length > 24 ? txt.substring(0, 24) + '…' : txt;
    document.getElementById('modal-sel-preview').textContent = preview;
    document.getElementById('modal-sel-bar').style.display = 'block';
  } else {
    hideSelBar();
  }
}

function hideSelBar() {
  document.getElementById('modal-sel-bar').style.display = 'none';
  document.getElementById('modal-sel-preview').textContent = '';
}

/* 選択テキストを指定フィールドへ送る */
function sendToField(fieldId) {
  var sel = window.getSelection();
  var raw = sel ? sel.toString() : '';
  /* 余分な空白・改行を整理 */
  var txt = raw.replace(/[\r\n]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
  if (!txt) return;

  /* 矛盾チェック（軽い警告のみ、ブロックしない） */
  if (fieldId === 'f-name' && /^(東京都|北海道|(?:大阪|京都)府|.{2,3}県|[市区町村])/.test(txt)) {
    console.log('Note: 住所らしい文字列が名称へセットされました: ' + txt);
  }
  if (fieldId === 'f-location' && /発電所$/.test(txt)) {
    console.log('Note: 発電所で終わる文字列が所在地へセットされました: ' + txt);
  }

  /* メインフィールドへ反映 */
  setField(fieldId, txt);
  console.log('sendToField: ' + fieldId + ' ← "' + txt + '"');

  /* モーダル内ミラーフィールドへ反映＋フラッシュアニメーション */
  var mirror = document.getElementById('modal-' + fieldId);
  if (mirror) {
    mirror.value = txt;
    mirror.classList.remove('flashing');
    void mirror.offsetWidth; /* reflow でアニメーションをリセット */
    mirror.classList.add('flashing');
    setTimeout(function() { mirror.classList.remove('flashing'); }, 900);
  }

  /* 振り分けバーに完了メッセージを表示してから消す */
  var labels = { 'f-name': '名称', 'f-jobno': '工番', 'f-location': '所在地' };
  var prev = document.getElementById('modal-sel-preview');
  prev.textContent = '✅ ' + labels[fieldId] + 'へ反映！';
  if (sel) sel.removeAllRanges();
  setTimeout(function() { hideSelBar(); }, 1000);
}

/* 現場スペック＋ペーストエリアを全クリア＋localStorage削除 */
function resetSiteFields() {
  ['f-name', 'f-jobno', 'f-location'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('field-highlight'); }
  });
  var sp = document.getElementById('sign-paste');
  if (sp) sp.value = '';
  localStorage.removeItem('site_name');
  localStorage.removeItem('site_jobno');
  localStorage.removeItem('site_location');
}

/* ===== テキスト貼り付け → 自動振り分け ===== */

function normalizeStr(str) {
  return str
    .replace(/[Ａ-Ｚａ-ｚ０-９！-～]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) - 0xFEE0); })
    .replace(/　/g, ' ').replace(/：/g, ':').replace(/（/g, '(').replace(/）/g, ')');
}

function extractSiteInfo(rawText) {
  var text  = normalizeStr(rawText);
  var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);

  var companyRe   = /株式会社|有限会社|合同会社|支店|営業所|本社|所有者|保全管理|施工業者/;
  var nameExclude = /株式会社|有限会社|合同会社|支店|営業所|様|殿|御中|所有者|保全管理|施工業者/;
  var addressRe   = /[市区町村郡]|番地|丁目|[0-9]+番[0-9]*号/;
  /* 都道府県名または市/区/町/村で「始まる」行（先頭一致） */
  var prefStart   = /^(東京都|北海道|(?:大阪|京都)府|.{2,3}県|[市区町村])/;
  var allLabels   = /施工地|所在地|設置場所|工事場所|現場住所|住所|工事名|現場名|発電所名|施設名|名称|工番|管理番号|設備.?ID|No\.|№|番号/;

  var result = { name: null, jobno: null, location: null };

  console.log('Parse: start (' + lines.length + ' lines)');
  lines.forEach(function(l, i) { console.log('  [' + i + '] ' + l); });

  function valueAfterLabel(labelRe, excludeRe) {
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (!labelRe.test(line)) continue;
      if (excludeRe && excludeRe.test(line)) continue;
      var after = line.replace(labelRe, '').replace(/^[\s：:=　\t]+/, '').trim();
      var stop  = after.search(allLabels);
      if (stop > 0) after = after.substring(0, stop).trim();
      if (after.length > 0 && !(excludeRe && excludeRe.test(after))) {
        console.log('  Extract: same-line "' + line + '" → "' + after + '"');
        return after;
      }
      var next = lines[i + 1] || '';
      if (next && !allLabels.test(next) && !(excludeRe && excludeRe.test(next))) {
        console.log('  Extract: next-line "' + line + '" → "' + next + '"');
        return next;
      }
    }
    return null;
  }

  /* ===== 名称 ===== */
  /* 優先①: 末尾が「発電所」で終わる行 */
  for (var i = 0; i < lines.length; i++) {
    if (/発電所$/.test(lines[i]) && !nameExclude.test(lines[i])) {
      result.name = lines[i];
      console.log('Name: ' + result.name + ' (Reason: 末尾が発電所なので名称にセットしました)');
      break;
    }
  }
  /* 優先②: ラベル直後の値 */
  if (!result.name) {
    var nameRaw = valueAfterLabel(/工事名|現場名|発電所名|施設名|名称/, nameExclude);
    if (nameRaw && !nameExclude.test(nameRaw)) {
      result.name = nameRaw;
      console.log('Name: ' + result.name + ' (Reason: ラベル直後の値)');
    }
  }
  /* 優先③: スコアリングフォールバック */
  if (!result.name) {
    var nameCands = lines.filter(function(l) {
      return !nameExclude.test(l) && !companyRe.test(l) &&
             !addressRe.test(l)   && !prefStart.test(l) &&
             !(allLabels.test(l) && l.replace(allLabels, '').trim() === '') &&
             l.length > 2;
    });
    if (nameCands.length > 0) {
      nameCands.sort(function(a, b) {
        function sc(s) {
          var v = s.length;
          if (/発電所|太陽光|メガソーラー|PV/.test(s)) v += 100;
          if (/工事/.test(s)) v += 50;
          return v;
        }
        return sc(b) - sc(a);
      });
      result.name = nameCands[0];
      console.log('Name: ' + result.name + ' (Reason: スコア最高行)');
    }
  }

  /* ===== 工番① キーワードベース ===== */
  var jobRaw = valueAfterLabel(/工番|管理番号|設備.?ID|No\.|№|番号/);
  if (jobRaw) {
    var jCode = jobRaw.match(/^([A-Za-z0-9][A-Za-z0-9\-\/]*)/);
    result.jobno = jCode ? jCode[1] : jobRaw;
    console.log('JobNo: ' + result.jobno + ' (Reason: ラベル直後の英数字)');
  }
  /* ===== 工番② 日本語を含まない英数字+記号の塊をスキャン ===== */
  if (!result.jobno) {
    var dateRe = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/;
    var phoneRe = /^\d{2,4}-\d{3,4}-\d{4}$/;
    var jpRe   = /[^\x00-\x7F\-\/]/; /* 日本語文字を含む判定 */
    /* 行全体が日本語なしかつコード形式 */
    for (var ji = 0; ji < lines.length; ji++) {
      var ln = lines[ji];
      if (jpRe.test(ln)) continue; /* 日本語を含む行はスキップ */
      var codeRe = /([A-Za-z0-9][A-Za-z0-9\-\/]{2,})/g;
      var found; codeRe.lastIndex = 0;
      while ((found = codeRe.exec(ln)) !== null) {
        var c = found[1];
        if (!dateRe.test(c) && !phoneRe.test(c)) {
          result.jobno = c;
          console.log('JobNo: ' + c + ' (Reason: 日本語を含まない英数字コード from "' + ln + '")');
          break;
        }
      }
      if (result.jobno) break;
    }
  }
  /* ===== 工番③ 全行から英数混在パターンをスキャン（最終手段） ===== */
  if (!result.jobno) {
    var dateRe2  = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/;
    var phoneRe2 = /^\d{2,4}-\d{3,4}-\d{4}$/;
    var codeRe2  = /\b([A-Za-z]{1,8}[-\/]?[0-9]{2,}[A-Za-z0-9\-\/]*|[0-9]{2,}[-\/][A-Za-z][A-Za-z0-9\-\/]*|[A-Za-z]{2,}[0-9]{2,}[A-Za-z0-9\-\/]*)\b/g;
    outer:
    for (var li = 0; li < lines.length; li++) {
      var f2; codeRe2.lastIndex = 0;
      while ((f2 = codeRe2.exec(lines[li])) !== null) {
        var c2 = f2[1];
        if (c2.length >= 3 && !dateRe2.test(c2) && !phoneRe2.test(c2)) {
          result.jobno = c2;
          console.log('JobNo: ' + c2 + ' (Reason: 英数混在コード from "' + lines[li] + '")');
          break outer;
        }
      }
    }
  }

  /* ===== 所在地① ラベルマッチ ===== */
  var locRaw = valueAfterLabel(/施工地|所在地|設置場所|工事場所|現場住所|住所/, companyRe);
  if (locRaw && !companyRe.test(locRaw) && locRaw !== result.name) {
    result.location = locRaw;
    console.log('Location: ' + result.location + ' (Reason: ラベル直後の値)');
  }
  /* ===== 所在地②【消去法】都道府県名 or 市/区/町/村から始まり、末尾が「発電所」でない行 ===== */
  if (!result.location) {
    for (var k = 0; k < lines.length; k++) {
      var kl = lines[k];
      if (!prefStart.test(kl)) continue;       /* 地名始点でない → スキップ */
      if (/発電所$/.test(kl)) continue;         /* 末尾が発電所 → 名称なのでスキップ */
      if (companyRe.test(kl)) continue;         /* 会社名を含む → スキップ */
      if (kl === result.name) continue;          /* 既に名称として採用済み → スキップ */
      result.location = kl;
      console.log('Location: ' + result.location + ' (Reason: 地名から始まり発電所で終わらないため所在地と判断しました)');
      break;
    }
  }
  /* ===== 所在地③ 市区町村・番地フォールバック ===== */
  if (!result.location) {
    for (var m = 0; m < lines.length; m++) {
      var al = lines[m];
      if (addressRe.test(al) && !companyRe.test(al) && al !== result.name) {
        result.location = al;
        console.log('Location: ' + result.location + ' (Reason: 市/町/番地を含む行)');
        break;
      }
    }
  }

  console.log('Result: ' + JSON.stringify(result));
  return result;
}

function setField(id, value) {
  var el = document.getElementById(id);
  if (!el || !value) return;
  el.value = value;
  el.dispatchEvent(new Event('input'));
  el.classList.add('field-highlight');
  setTimeout(function() { el.classList.remove('field-highlight'); }, 2500);
}

function parsePastedText() {
  var ta   = document.getElementById('sign-paste');
  var text = ta.value;
  if (!text.trim() || text.indexOf('✅') === 0 || text.indexOf('⚠️') === 0) return;

  var result = extractSiteInfo(text);
  var filled = [], missing = [];

  if (result.name)     { setField('f-name',     result.name);     filled.push('名称'); }
  else                 { missing.push('名称'); }
  if (result.jobno)    { setField('f-jobno',     result.jobno);    filled.push('工番'); }
  else                 { missing.push('工番'); }
  if (result.location) { setField('f-location',  result.location); filled.push('所在地'); }
  else                 { missing.push('所在地'); }

  if (filled.length > 0 && missing.length === 0) {
    ta.value = '✅ ' + filled.join('・') + ' を反映しました';
  } else if (filled.length > 0) {
    ta.value = '✅ ' + filled.join('・') + ' を反映 ／ ⚠️ ' + missing.join('・') + ' は手入力してください';
  } else {
    ta.value = '⚠️ 自動判別できませんでした。各欄を手入力してください。';
  }
  setTimeout(function() {
    var v = ta.value;
    if (v.indexOf('✅') === 0 || v.indexOf('⚠️') === 0) ta.value = '';
  }, 4000);
}

/* ===== localStorage 自動保存・読み込み ===== */
var SAVE_MAP = { 'f-name': 'site_name', 'f-jobno': 'site_jobno', 'f-location': 'site_location' };

function initLocalStorage() {
  Object.keys(SAVE_MAP).forEach(function(id) {
    var el  = document.getElementById(id);
    var key = SAVE_MAP[id];
    var saved = localStorage.getItem(key);
    if (saved && el) el.value = saved;
    if (el) {
      el.addEventListener('input', function() {
        localStorage.setItem(key, el.value);
      });
    }
  });
}

/* 写真プレビュー */
function preview(input) {
  var box = document.getElementById('prev-' + input.id);
  box.innerHTML = '';
  for (var i = 0; i < input.files.length; i++) {
    (function(src) {
      var wrap = document.createElement('div');
      wrap.className = 'prev-item';
      var img = document.createElement('img');
      img.src = src;
      var btn = document.createElement('button');
      btn.className = 'prev-del';
      btn.textContent = '×';
      btn.onclick = function() { wrap.remove(); };
      wrap.appendChild(img);
      wrap.appendChild(btn);
      box.appendChild(wrap);
    })(URL.createObjectURL(input.files[i]));
  }
}

/* フォームの値を取得 */
function val(id) {
  var e = document.getElementById(id);
  return (e && e.value) ? e.value.trim() : '';
}

/* プレビューから写真HTML */
function photoHtml(prevId) {
  var box = document.getElementById(prevId);
  var imgs = box ? box.querySelectorAll('.prev-item img') : [];
  if (!imgs.length) {
    return '<p class="no-photo">（写真なし）</p>';
  }
  var h = '<div class="r-photos">';
  for (var i = 0; i < imgs.length; i++) {
    h += '<img src="' + imgs[i].src + '">';
  }
  return h + '</div>';
}

/* ===== データ一元管理：報告書データ構造 ===== */
function buildReportData() {
  var areaBlocks = document.querySelectorAll('#areas-container [id^="area-block-"]');
  var areas = [];
  areaBlocks.forEach(function(block) {
    var k = block.id.replace('area-block-', '');
    areas.push({
      areaId:       k,
      photosBefore: document.querySelectorAll('#prev-fi' + k + 'b .prev-item img').length,
      photosAfter:  document.querySelectorAll('#prev-fi' + k + 'a .prev-item img').length,
      photosHerb:   document.querySelectorAll('#prev-fi' + k + 'h .prev-item img').length,
      notes:        val('notes-' + k)
    });
  });
  return {
    generatedAt: new Date().toISOString(),
    project:     val('f-project'),
    siteName:    val('f-name'),
    jobNo:       val('f-jobno'),
    location:    val('f-location'),
    client:      val('f-client'),
    date:        val('f-date'),
    weather:     val('f-weather'),
    workTime:    val('f-time'),
    workers:     val('f-workers'),
    staff:       val('f-staff'),
    areas:       areas,
    overview:    val('f-overview'),
    herbicide:   val('f-herbicide'),
    proposal:    val('f-proposal'),
    remarks:     val('f-remarks')
  };
}

/* ===== Google Sheets 送信（土台） =====
   本番化する際は SHEET_URL にGASのデプロイURLを設定する。
   GAS側: doPost(e) { var d = JSON.parse(e.postData.contents); ... }
   ================================================= */
function sendToSpreadsheet(data) {
  var SHEET_URL = ''; /* ← GASデプロイURLをここに貼り付け */
  console.log('[Sheets送信データ]', JSON.stringify(data, null, 2));
  if (!SHEET_URL) return;
  fetch(SHEET_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  }).catch(function(e) { console.warn('[Sheets送信失敗]', e); });
}

/* 報告書を生成して画面を切り替える */
function generateReport() {
  var reportData = buildReportData();
  sendToSpreadsheet(reportData);

  var proj = val('f-project')  || '（案件名未入力）';
  var name = val('f-name')    || '　';
  var jobno= val('f-jobno')   || '　';
  var loc  = val('f-location')|| '　';
  var cli  = val('f-client')  || '　';
  var dt   = val('f-date')    || '　';
  var wt   = val('f-weather') || '　';
  var tm   = val('f-time')    || '　';
  var wk   = val('f-workers') || '　';
  var st   = val('f-staff')   || '　';

  var h = '';

  h += '<h1>' + proj + '</h1>';
  h += '<p class="r-client">' + cli + ' 御中</p>';

  h += '<div class="r-h2">1. 作業概要</div>';
  h += '<table>';
  h += '<tr><th>案件名</th><td>' + proj + '</td></tr>';
  h += '<tr><th>名称（現場名称）</th><td>' + name + '</td></tr>';
  h += '<tr><th>工番 / 管理番号</th><td>' + jobno + '</td></tr>';
  h += '<tr><th>所在地</th><td>' + loc  + '</td></tr>';
  h += '<tr><th>提出先</th><td>' + cli  + '</td></tr>';
  h += '<tr><th>作業日</th><td>' + dt   + '</td></tr>';
  h += '<tr><th>天候 / 気温</th><td>' + wt + '</td></tr>';
  h += '<tr><th>作業時間帯</th><td>' + tm + '</td></tr>';
  h += '<tr><th>作業人数</th><td>' + wk  + '</td></tr>';
  h += '<tr><th>担当者</th><td>' + st   + '</td></tr>';
  h += '</table>';

  h += '<div class="r-h2">2. 看板写真</div>';
  h += photoHtml('prev-sign');

  h += '<div class="r-h2">3. エリア別 作業記録</div>';
  var areaBlocks = document.querySelectorAll('#areas-container [id^="area-block-"]');
  for (var a = 0; a < areaBlocks.length; a++) {
    var k = areaBlocks[a].id.replace('area-block-', '');
    h += '<div class="r-h3">エリア' + k + '</div>';
    h += '<b>作業前（Before）</b>' + photoHtml('prev-fi' + k + 'b');
    h += '<b>作業後（After）</b>'  + photoHtml('prev-fi' + k + 'a');
    h += '<b>除草剤散布後</b>'     + photoHtml('prev-fi' + k + 'h');
    h += '<b>所見</b>';
    h += '<div class="r-notes">' + (val('notes-' + k) || '（所見なし）') + '</div>';
  }
  if (!areaBlocks.length) {
    h += '<p class="no-photo">（エリアなし）</p>';
  }

  h += '<div class="r-h2">4. 全体所見</div>';
  h += '<div class="r-notes">' + (val('f-overview') || '（記載なし）') + '</div>';

  h += '<div class="r-h2">5. 除草剤使用記録</div>';
  h += '<b>散布状況写真</b>' + photoHtml('prev-figh');
  h += '<div class="r-notes">' + (val('f-herbicide') || '（記載なし）') + '</div>';

  h += '<div class="r-h2">6. 次回作業の提案</div>';
  h += '<b>提案箇所写真</b>' + photoHtml('prev-figp');
  h += '<div class="r-notes">' + (val('f-proposal') || '（記載なし）') + '</div>';

  h += '<div class="r-h2">7. 備考・連絡事項</div>';
  h += '<div class="r-notes">' + (val('f-remarks') || '特になし') + '</div>';

  var iu = val('f-icloud');
  if (iu) {
    h += '<div style="margin:16px 0;padding:12px;border:1px solid #2e7d45;border-radius:6px;">';
    h += '<b>詳細写真（iCloud）：</b><br>';
    h += '<a href="' + iu + '" style="color:#1a5c2a;word-break:break-all;">' + iu + '</a>';
    h += '</div>';
  }

  h += '<div style="text-align:right;margin-top:32px;font-size:14px;color:#555;">担当者：' + st + '</div>';
  h += '<p style="text-align:center;color:#bbb;font-size:13px;margin-top:24px;">以上</p>';

  document.getElementById('view-report').innerHTML = h;
  document.getElementById('view-form').style.display   = 'none';
  document.getElementById('view-report').style.display = 'block';
  document.getElementById('done-banner').style.display = 'block';
  document.getElementById('back-btn').style.display    = 'block';
  window.scrollTo(0, 0);
}

/* 入力画面に戻る */
function backToForm() {
  document.getElementById('view-report').style.display = 'none';
  document.getElementById('done-banner').style.display = 'none';
  document.getElementById('back-btn').style.display    = 'none';
  document.getElementById('view-form').style.display   = 'block';
  window.scrollTo(0, 0);
}

/* 初期エリアを1つ追加 */
addArea();

/* 今日の日付をセット */
var d = new Date();
document.getElementById('f-date').value =
  d.getFullYear() + '-' +
  ('0' + (d.getMonth() + 1)).slice(-2) + '-' +
  ('0' + d.getDate()).slice(-2);

/* ===== PWA ホーム画面アイコンを Canvas で生成 ===== */
(function() {
  try {
    var c   = document.createElement('canvas');
    c.width = 180; c.height = 180;
    var ctx = c.getContext('2d');

    var r = 36;
    ctx.fillStyle = '#1a5c2a';
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(180 - r, 0);
    ctx.quadraticCurveTo(180, 0,   180, r);
    ctx.lineTo(180, 180 - r);
    ctx.quadraticCurveTo(180, 180, 180 - r, 180);
    ctx.lineTo(r, 180);
    ctx.quadraticCurveTo(0, 180,   0, 180 - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0,     r, 0);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle    = '#a8d5b0';
    ctx.font         = 'bold 80px sans-serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('草', 90, 110);

    ctx.fillStyle = '#ffffff';
    ctx.font      = 'bold 26px sans-serif';
    ctx.fillText('報告書', 90, 158);

    var link = document.getElementById('touch-icon');
    if (link) link.href = c.toDataURL('image/png');
  } catch(e) {}
})();
</script>
