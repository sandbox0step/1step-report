<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASR カメラ</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ASRカメラ">
  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: sans-serif; font-size: 16px; margin: 0; background: #fff;
      padding: 12px;
      padding-top:    max(12px, env(safe-area-inset-top));
      padding-bottom: max(60px, env(safe-area-inset-bottom));
      padding-left:   max(12px, env(safe-area-inset-left));
      padding-right:  max(12px, env(safe-area-inset-right));
    }
    h1 { font-size: 20px; margin: 8px 0 10px; }
    h2 { font-size: 16px; background: #2e7d45; color: #fff; padding: 8px 12px; margin: 20px -12px 12px; }
    label { display: block; font-weight: bold; margin: 10px 0 4px; font-size: 15px; }
    input[type=text] {
      display: block; width: 100%; font-size: 16px;
      padding: 10px; color: #000; background: #fff;
      border: 2px solid #333; border-radius: 4px;
    }

    /* GPS */
    #gps-status {
      font-size: 12px; padding: 6px 10px; border-radius: 4px; margin-bottom: 12px;
      background: #f0f4f8; border: 1px solid #b0bec5; color: #555;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #gps-status.ok  { background: #e8f5ec; border-color: #a5d6a7; color: #1a5c2a; }
    #gps-status.err { background: #fdecea; border-color: #ef9a9a; color: #c0392b; }

    /* モードボタン */
    .mode-btns { display: flex; gap: 8px; margin-bottom: 14px; }
    .mode-btn {
      flex: 1; font-size: 15px; font-weight: bold; padding: 14px 4px;
      background: #f5f5f5; color: #555;
      border: 2px solid #ddd; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    #btn-before.active { background: #1565c0; color: #fff; border-color: #1565c0; }
    #btn-after.active  { background: #e65100; color: #fff; border-color: #e65100; }
    #btn-check.active  { background: #6a1b9a; color: #fff; border-color: #6a1b9a; }

    /* 選択ボタン */
    .select-btn {
      display: block; width: 100%; font-size: 18px; font-weight: bold;
      padding: 18px; margin: 0 0 4px;
      background: #2e7d45; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    .select-btn:active   { background: #1a5c2a; }
    .select-btn:disabled { background: #90a4ae; cursor: not-allowed; }

    /* カテゴリブロック */
    .cat-block { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; font-weight: bold; font-size: 15px;
    }
    .cat-block[data-mode="作業前"] .cat-header { background: #dce8ff; color: #1565c0; }
    .cat-block[data-mode="作業後"] .cat-header { background: #fff3e0; color: #bf360c; }
    .cat-block[data-mode="点検"]   .cat-header { background: #f3e5f5; color: #6a1b9a; }
    .cat-count { font-size: 13px; font-weight: normal; }
    .cat-grid  { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; min-height: 20px; }
    .cat-empty { color: #aaa; font-size: 13px; margin: 0; }

    /* サムネイル */
    .thumb-item { position: relative; width: 80px; flex-shrink: 0; }
    .thumb-item img {
      width: 80px; height: 80px; object-fit: cover;
      border-radius: 4px; display: block; cursor: pointer;
    }
    .thumb-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.62); color: #fff;
      font-size: 8px; padding: 2px 4px; line-height: 1.4;
      border-radius: 0 0 4px 4px;
    }
    .thumb-del {
      position: absolute; top: 0; right: 0;
      width: 24px; height: 24px;
      background: rgba(200,0,0,0.85); color: #fff;
      border: none; border-radius: 0 4px 0 5px;
      font-size: 14px; font-weight: bold; line-height: 24px; text-align: center;
      cursor: pointer; -webkit-appearance: none; padding: 0;
    }

    /* リンク発行ボタン */
    .issue-btn {
      display: block; width: 100%; font-size: 18px; font-weight: bold;
      padding: 18px; margin: 0 0 8px;
      background: #1565c0; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    .issue-btn:active   { background: #0d47a1; }
    .issue-btn:disabled { background: #90a4ae; cursor: not-allowed; }

    /* プログレス */
    #progress-area {
      display: none; font-size: 14px; font-weight: bold; text-align: center;
      padding: 10px 12px; margin-bottom: 8px;
      background: #e3f2fd; border: 1px solid #90caf9; border-radius: 6px;
    }
    #progress-bar-outer { background: #bbdefb; border-radius: 4px; height: 8px; margin-top: 6px; }
    #progress-bar { background: #1565c0; height: 8px; border-radius: 4px; width: 0; transition: width 0.2s; }

    /* メッセージ */
    .msg {
      font-size: 14px; font-weight: bold; padding: 8px 12px;
      border-radius: 6px; margin-bottom: 8px; display: none;
    }
    .msg.ok  { background: #e8f5ec; color: #1a5c2a; border: 1px solid #a5d6a7; display: block; }
    .msg.err { background: #fdecea; color: #c0392b; border: 1px solid #ef9a9a; display: block; }

    /* リンク結果 */
    #link-results { margin-bottom: 4px; }
    .link-result-block { border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .link-result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .link-mode-name { font-size: 15px; font-weight: bold; }
    .link-status    { font-size: 13px; }
    .link-status.ok  { color: #1a5c2a; }
    .link-status.err { color: #c0392b; }
    .link-url-wrap { display: flex; gap: 8px; align-items: stretch; margin-bottom: 6px; }
    .link-url {
      flex: 1; font-size: 11px; color: #1565c0; font-family: monospace;
      padding: 6px 8px; border: 1px solid #a5d6a7; border-radius: 4px;
      background: #f0fff4; resize: none; min-height: 36px; word-break: break-all;
    }
    .copy-btn {
      font-size: 13px; font-weight: bold; white-space: nowrap;
      padding: 8px 12px; background: #1e8e3e; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; -webkit-appearance: none;
    }
    .copy-btn:active { background: #1a5c2a; }
    .retry-btn {
      display: block; width: 100%; font-size: 14px; font-weight: bold;
      padding: 10px; background: #e65100; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; -webkit-appearance: none;
    }
    .retry-btn:active { background: #bf360c; }

    /* スプレッドシート反映ボタン */
    #sheet-btn {
      display: none; width: 100%; font-size: 18px; font-weight: bold;
      padding: 18px; margin: 0 0 8px;
      background: #1e8e3e; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    #sheet-btn.visible { display: block; }
    #sheet-btn:active   { background: #1a5c2a; }
    #sheet-btn:disabled { background: #90a4ae; cursor: not-allowed; }
  </style>
</head>
<body>

<h1>ASR カメラ</h1>
<div id="gps-status">📍 GPS: 取得中...</div>

<!-- 現場情報 -->
<h2>現場情報</h2>
<label for="site-name">現場名
  <span style="font-weight:normal;font-size:12px;color:#888;">（Driveフォルダ名）</span>
</label>
<input type="text" id="site-name" placeholder="例：○○太陽光発電所">

<!-- モード選択 -->
<h2>モード選択</h2>
<div class="mode-btns">
  <button class="mode-btn active" id="btn-before" type="button" onclick="setMode('作業前')">作業前</button>
  <button class="mode-btn"        id="btn-after"  type="button" onclick="setMode('作業後')">作業後</button>
  <button class="mode-btn"        id="btn-check"  type="button" onclick="setMode('点検')">点検</button>
</div>
<input type="file" id="cam-input" accept="image/*" multiple style="display:none"
       onchange="onFileSelect(this)">
<button id="select-btn" class="select-btn" type="button"
        onclick="document.getElementById('cam-input').click()">
  📂 写真を選択（<span id="mode-label">作業前</span>・複数可）
</button>

<!-- カテゴリ別写真管理 -->
<h2>カテゴリ別写真管理</h2>
<div id="cats">
  <div class="cat-block" data-mode="作業前">
    <div class="cat-header">
      <span>作業前</span><span class="cat-count" id="cnt-before">0枚</span>
    </div>
    <div class="cat-grid" id="grid-before"><p class="cat-empty">写真なし</p></div>
  </div>
  <div class="cat-block" data-mode="作業後">
    <div class="cat-header">
      <span>作業後</span><span class="cat-count" id="cnt-after">0枚</span>
    </div>
    <div class="cat-grid" id="grid-after"><p class="cat-empty">写真なし</p></div>
  </div>
  <div class="cat-block" data-mode="点検">
    <div class="cat-header">
      <span>点検</span><span class="cat-count" id="cnt-check">0枚</span>
    </div>
    <div class="cat-grid" id="grid-check"><p class="cat-empty">写真なし</p></div>
  </div>
</div>

<!-- リンク発行 -->
<h2>リンク発行</h2>
<div id="issue-msg" class="msg"></div>
<button id="issue-btn" class="issue-btn" type="button" onclick="issueLinks()">
  🔗 リンク発行（Driveにアップロード）
</button>
<div id="progress-area">
  <span id="progress-text">0 / 0 枚完了</span>
  <div id="progress-bar-outer"><div id="progress-bar"></div></div>
</div>
<div id="link-results"></div>

<!-- スプレッドシート反映 -->
<h2>スプレッドシート反映</h2>
<button id="sheet-btn" type="button" onclick="sendToSheet()">
  📊 スプレッドシートに反映
</button>
<div id="sheet-msg" class="msg"></div>

<script>
/* ================================================================
   設定
   ================================================================ */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxtnLLUlzeMgubyjW4fY9g2Cf2O2yS_P_p1mSOyaXlYUyrul1xm_tDCXVrl-PB3fqYw/exec';

/* ================================================================
   状態
   ================================================================ */
var currentMode    = '作業前';
var photoDB        = { '作業前': [], '作業後': [], '点検': [] };
var categoryLinks  = { '作業前': null, '作業後': null, '点検': null };
var categoryFailed = { '作業前': 0,    '作業後': 0,    '点検': 0    };
var photoId        = 0;
var gpsCoords      = null;
var _upTotal = 0, _upDone = 0, _upFail = 0;

var MODE_CFG = {
  '作業前': { id: 'before', color: '#1565c0' },
  '作業後': { id: 'after',  color: '#e65100' },
  '点検':   { id: 'check',  color: '#6a1b9a' }
};
var MODES = ['作業前', '作業後', '点検'];

/* ================================================================
   GPS（起動時に1回許可を求め、watchPosition で自動更新）
   ================================================================ */
function initGPS() {
  var el = document.getElementById('gps-status');
  if (!navigator.geolocation) {
    el.textContent = '📍 GPS: このブラウザはGPS非対応';
    el.className   = 'err';
    return;
  }
  navigator.geolocation.watchPosition(
    function(pos) {
      gpsCoords = {
        lat: pos.coords.latitude.toFixed(6),
        lng: pos.coords.longitude.toFixed(6),
        acc: Math.round(pos.coords.accuracy)
      };
      el.textContent = '📍 ' + gpsCoords.lat + ', ' + gpsCoords.lng + '（精度 ±' + gpsCoords.acc + 'm）';
      el.className   = 'ok';
    },
    function() {
      el.textContent = '📍 GPS: 取得失敗（設定→位置情報を許可してください）';
      el.className   = 'err';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
  );
}

/* ================================================================
   モード切り替え
   ================================================================ */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-label').textContent = mode;
  MODES.forEach(function(m) {
    document.getElementById('btn-' + MODE_CFG[m].id).classList.toggle('active', m === mode);
  });
}

/* ================================================================
   写真選択（複数枚・カメラロール）
   EXIFで撮影日時・GPS取得 → EXIFにGPSがなければ現在地を使用
   ================================================================ */
async function onFileSelect(input) {
  var files = Array.from(input.files || []);
  if (!files.length) return;

  var mode = currentMode;
  var btn  = document.getElementById('select-btn');
  btn.disabled    = true;
  btn.textContent = '📂 読み込み中 (0/' + files.length + ')...';

  var done = 0;
  var results;
  try {
    results = await Promise.all(files.map(async function(file) {
      var item = await extractFileData(file, mode);
      done++;
      btn.textContent = '📂 読み込み中 (' + done + '/' + files.length + ')...';
      return item;
    }));
  } catch (e) {
    console.error('File processing error:', e);
    results = [];
  }

  var cfg      = MODE_CFG[mode];
  var grid     = document.getElementById('grid-' + cfg.id);
  var emptyMsg = grid.querySelector('.cat-empty');
  if (emptyMsg) emptyMsg.remove();

  var frag = document.createDocumentFragment();
  results.forEach(function(r) {
    if (!r) return;
    photoDB[mode].push(r);
    frag.appendChild(buildThumb(r));
  });
  grid.appendChild(frag);
  updateCategoryCount(mode);

  btn.disabled    = false;
  btn.textContent = '📂 写真を選択（' + mode + '・複数可）';
  input.value     = '';
}

/* 1ファイルのEXIFデータ抽出 */
async function extractFileData(file, mode) {
  var now = new Date(), datetime = null, dateObj = null, gps = null;
  try {
    if (typeof exifr !== 'undefined') {
      var arr = await Promise.all([
        exifr.gps(file).catch(function() { return null; }),
        exifr.parse(file, { pick: ['DateTimeOriginal'] }).catch(function() { return null; })
      ]);
      var exifGps  = arr[0];
      var exifTags = arr[1];
      if (exifTags && exifTags.DateTimeOriginal) {
        dateObj  = new Date(exifTags.DateTimeOriginal);
        datetime = formatDatetime(dateObj);
      }
      if (exifGps && exifGps.latitude != null) {
        gps = { lat: exifGps.latitude.toFixed(6), lng: exifGps.longitude.toFixed(6), src: 'EXIF' };
      }
    }
  } catch (e) {}

  if (!dateObj)  { dateObj  = now; }
  if (!datetime) { datetime = formatDatetime(now); }
  if (!gps && gpsCoords) {
    gps = { lat: gpsCoords.lat, lng: gpsCoords.lng, src: '現在地' };
  }

  return {
    id: ++photoId, mode: mode, file: file,
    src: URL.createObjectURL(file),
    datetime: datetime, dateObj: dateObj, gps: gps,
    uploaded: false
  };
}

/* ================================================================
   サムネイル DOM 生成
   ================================================================ */
function buildThumb(p) {
  var wrap = document.createElement('div');
  wrap.className = 'thumb-item';
  wrap.id        = 'thumb-' + p.id;

  var img = document.createElement('img');
  img.src     = p.src;
  img.loading = 'lazy';
  img.onclick = (function(s) { return function() { window.open(s, '_blank'); }; })(p.src);

  var meta = document.createElement('div');
  meta.className   = 'thumb-meta';
  meta.textContent = p.datetime;
  if (p.gps) {
    meta.appendChild(document.createElement('br'));
    meta.appendChild(document.createTextNode('📍' + p.gps.lat + ',' + p.gps.lng));
  }

  var del = document.createElement('button');
  del.className   = 'thumb-del';
  del.type        = 'button';
  del.textContent = '×';
  del.onclick = (function(mode, id) {
    return function() { removePhoto(mode, id); };
  })(p.mode, p.id);

  wrap.appendChild(img);
  wrap.appendChild(meta);
  wrap.appendChild(del);
  return wrap;
}

function removePhoto(mode, id) {
  photoDB[mode] = photoDB[mode].filter(function(p) { return p.id !== id; });
  var el = document.getElementById('thumb-' + id);
  if (el) el.remove();
  updateCategoryCount(mode);
  var grid = document.getElementById('grid-' + MODE_CFG[mode].id);
  if (grid && !photoDB[mode].length) {
    var msg = document.createElement('p');
    msg.className   = 'cat-empty';
    msg.textContent = '写真なし';
    grid.appendChild(msg);
  }
}

function updateCategoryCount(mode) {
  var el = document.getElementById('cnt-' + MODE_CFG[mode].id);
  if (el) el.textContent = photoDB[mode].length + '枚';
}

/* ================================================================
   リンク発行（カテゴリ別に順次アップロード）
   ================================================================ */
async function issueLinks() {
  clearMsg('issue-msg');
  var total = MODES.reduce(function(s, m) { return s + photoDB[m].length; }, 0);
  if (!total) { showMsg('issue-msg', '写真がありません', 'err'); return; }

  var siteName = document.getElementById('site-name').value.trim();
  if (!siteName) { showMsg('issue-msg', '現場名を入力してください', 'err'); return; }

  var pending = MODES.reduce(function(s, m) {
    return s + photoDB[m].filter(function(p) { return !p.uploaded; }).length;
  }, 0);

  if (!pending) {
    renderLinkResults();
    checkSheetBtn();
    showMsg('issue-msg', 'すべてアップロード済みです', 'ok');
    return;
  }

  _upTotal = pending; _upDone = 0; _upFail = 0;

  var btn  = document.getElementById('issue-btn');
  var prog = document.getElementById('progress-area');
  btn.disabled       = true;
  prog.style.display = '';
  updateProgressUI();

  for (var i = 0; i < MODES.length; i++) {
    var mode = MODES[i];
    var modePending = photoDB[mode].filter(function(p) { return !p.uploaded; });
    if (!modePending.length) continue;
    await uploadCategory(mode, siteName);
  }

  prog.style.display = 'none';
  btn.disabled       = false;
  renderLinkResults();
  checkSheetBtn();

  var totalFails = MODES.reduce(function(s, m) { return s + categoryFailed[m]; }, 0);
  if (!totalFails) {
    showMsg('issue-msg', '✅ アップロード完了！', 'ok');
  } else {
    showMsg('issue-msg', '⚠ ' + totalFails + '枚失敗。各カテゴリの「再試行」で再送できます。', 'err');
  }
}

/* ================================================================
   カテゴリ単位アップロード
   ================================================================ */
async function uploadCategory(mode, siteName) {
  var pending  = photoDB[mode].filter(function(p) { return !p.uploaded; });
  var modeLink = categoryLinks[mode];
  var modeFail = 0;

  for (var i = 0; i < pending.length; i++) {
    var photo = pending[i];
    try {
      var link = await uploadOnePhoto(photo, siteName);
      photo.uploaded = true;
      if (link) modeLink = link;
      _upDone++;
    } catch (err) {
      modeFail++;
      _upFail++;
      console.error('Upload error photo=' + photo.id, err);
    }
    updateProgressUI();
  }

  if (modeLink) categoryLinks[mode] = modeLink;
  categoryFailed[mode] = modeFail;
}

/* ================================================================
   カテゴリ単位リトライ
   ================================================================ */
async function retryCategory(mode) {
  var siteName = document.getElementById('site-name').value.trim();
  if (!siteName) { showMsg('issue-msg', '現場名を入力してください', 'err'); return; }

  var pending = photoDB[mode].filter(function(p) { return !p.uploaded; });
  if (!pending.length) { renderLinkResults(); return; }

  _upTotal = pending.length; _upDone = 0; _upFail = 0;

  var btn  = document.getElementById('issue-btn');
  var prog = document.getElementById('progress-area');
  btn.disabled       = true;
  prog.style.display = '';
  updateProgressUI();

  await uploadCategory(mode, siteName);

  prog.style.display = 'none';
  btn.disabled       = false;
  renderLinkResults();
  checkSheetBtn();
}

/* ================================================================
   写真1枚をGASにPOST → カテゴリフォルダの共有URLを返す
   ================================================================ */
function uploadOnePhoto(photo, siteName) {
  return new Promise(function(resolve, reject) {
    compressImage(photo.file, function(blob) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64  = e.target.result.replace(/^data:[^;]+;base64,/, '');
        var gpsTag  = photo.gps ? ('_GPS' + photo.gps.lat + 'N' + photo.gps.lng + 'E') : '';
        var fname   = formatDatetimeFile(photo.dateObj) + gpsTag + '.jpg';

        var payload = JSON.stringify({
          type:      'camera_photo',
          imageData: base64,
          mimeType:  'image/jpeg',
          filename:  fname,
          mode:      photo.mode,
          siteName:  siteName,
          date:      formatDate(new Date()),
          lat:       photo.gps ? photo.gps.lat : '',
          lng:       photo.gps ? photo.gps.lng : ''
        });

        var ctrl  = new AbortController();
        var timer = setTimeout(function() { ctrl.abort(); }, 90000);

        fetch(GAS_URL, {
          method: 'POST', headers: { 'Content-Type': 'text/plain' },
          body: payload, signal: ctrl.signal
        })
        .then(function(r) {
          clearTimeout(timer);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function(res) {
          if (res.status !== 'ok') throw new Error(res.message || 'GAS error');
          resolve(res.link || null);
        })
        .catch(function(err) { clearTimeout(timer); reject(err); });
      };
      reader.onerror = function() { reject(new Error('FileReader error')); };
      reader.readAsDataURL(blob);
    });
  });
}

/* ================================================================
   プログレスUI
   ================================================================ */
function updateProgressUI() {
  document.getElementById('progress-text').textContent =
    _upDone + ' / ' + _upTotal + ' 枚完了' + (_upFail ? '（' + _upFail + '枚失敗）' : '');
  document.getElementById('progress-bar').style.width =
    (_upTotal ? Math.round(_upDone / _upTotal * 100) : 0) + '%';
}

/* ================================================================
   リンク結果を描画
   ================================================================ */
function renderLinkResults() {
  var container = document.getElementById('link-results');
  container.innerHTML = '';

  MODES.forEach(function(mode) {
    if (!photoDB[mode].length) return;

    var cfg      = MODE_CFG[mode];
    var link     = categoryLinks[mode];
    var failed   = categoryFailed[mode];
    var uploaded = photoDB[mode].filter(function(p) { return p.uploaded; }).length;

    var block = document.createElement('div');
    block.className = 'link-result-block';

    /* ヘッダー */
    var hdr = document.createElement('div');
    hdr.className = 'link-result-header';
    var nameEl = document.createElement('span');
    nameEl.className   = 'link-mode-name';
    nameEl.style.color = cfg.color;
    nameEl.textContent = '■ ' + mode;
    var statusEl = document.createElement('span');
    statusEl.className   = 'link-status ' + (failed ? 'err' : 'ok');
    statusEl.textContent = failed ? '❌ ' + failed + '枚失敗' : '✅ ' + uploaded + '枚完了';
    hdr.appendChild(nameEl);
    hdr.appendChild(statusEl);
    block.appendChild(hdr);

    /* URLとコピー */
    if (link) {
      var urlWrap = document.createElement('div');
      urlWrap.className = 'link-url-wrap';
      var ta = document.createElement('textarea');
      ta.className = 'link-url'; ta.readOnly = true; ta.rows = 2; ta.value = link;
      var copyBtn = document.createElement('button');
      copyBtn.className   = 'copy-btn';
      copyBtn.type        = 'button';
      copyBtn.textContent = 'コピー';
      copyBtn.onclick = (function(b) { return function() { copyLinkBtn(b); }; })(copyBtn);
      urlWrap.appendChild(ta);
      urlWrap.appendChild(copyBtn);
      block.appendChild(urlWrap);
    }

    /* 再試行ボタン */
    if (failed) {
      var retryBtn = document.createElement('button');
      retryBtn.className   = 'retry-btn';
      retryBtn.type        = 'button';
      retryBtn.textContent = '🔄 再試行（' + failed + '枚）';
      retryBtn.onclick = (function(m) { return function() { retryCategory(m); }; })(mode);
      block.appendChild(retryBtn);
    }

    container.appendChild(block);
  });
}

function checkSheetBtn() {
  var hasLink = MODES.some(function(m) { return categoryLinks[m]; });
  var btn = document.getElementById('sheet-btn');
  if (hasLink) btn.classList.add('visible');
  else         btn.classList.remove('visible');
}

/* ================================================================
   スプレッドシートに反映
   カテゴリ名とURLのみを送信
   ================================================================ */
async function sendToSheet() {
  var btn      = document.getElementById('sheet-btn');
  var siteName = document.getElementById('site-name').value.trim();
  clearMsg('sheet-msg');
  btn.disabled = true;

  var modes = MODES
    .filter(function(m) { return categoryLinks[m]; })
    .map(function(m) { return { name: m, url: categoryLinks[m] }; });

  if (!modes.length) {
    showMsg('sheet-msg', 'アルバムURLがありません。先にリンクを発行してください。', 'err');
    btn.disabled = false;
    return;
  }

  var payload = JSON.stringify({
    type:     'camera_asr',
    siteName: siteName,
    date:     formatDate(new Date()),
    modes:    modes
  });

  var ctrl  = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, 15000);

  try {
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: payload, signal: ctrl.signal
    });
    clearTimeout(timer);
    showMsg('sheet-msg', '✅ スプレッドシートに記録しました！', 'ok');
  } catch (err) {
    clearTimeout(timer);
    showMsg('sheet-msg', '❌ 送信に失敗しました（ネットワークを確認してください）', 'err');
  }

  btn.disabled = false;
}

/* ================================================================
   コピーボタン
   ================================================================ */
function copyLinkBtn(btnEl) {
  var ta   = btnEl.parentElement.querySelector('.link-url');
  var text = ta ? ta.value : '';
  if (!text) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      var orig = btnEl.textContent;
      btnEl.textContent = '完了!';
      setTimeout(function() { btnEl.textContent = orig; }, 1500);
    }).catch(function() { fallbackCopy(ta); });
  } else {
    fallbackCopy(ta);
  }
}
function fallbackCopy(ta) {
  ta.select(); ta.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); alert('コピーしました'); }
  catch (e) { alert('手動でコピーしてください'); }
}

/* ================================================================
   メッセージ
   ================================================================ */
function showMsg(elId, text, cls) {
  var el = document.getElementById(elId);
  el.textContent = text; el.className = 'msg ' + cls;
}
function clearMsg(elId) {
  var el = document.getElementById(elId);
  el.textContent = ''; el.className = 'msg';
}

/* ================================================================
   画像圧縮（最大1920px・JPEG 0.75）
   ================================================================ */
function compressImage(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var MAX   = 1920;
      var scale = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
      var w     = Math.round(img.naturalWidth * scale);
      var h     = Math.round(img.naturalHeight * scale);
      var c     = document.createElement('canvas');
      c.width   = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      c.toBlob(function(blob) { callback(blob); }, 'image/jpeg', 0.75);
    };
    img.onerror = function() { callback(file); };
    img.src = e.target.result;
  };
  reader.onerror = function() { callback(file); };
  reader.readAsDataURL(file);
}

/* ================================================================
   日付フォーマット
   ================================================================ */
function formatDate(d) {
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}
function formatDatetime(d) {
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日 ' +
    ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
}
function formatDatetimeFile(d) {
  d = d || new Date();
  return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2) + '_' +
    ('0'+d.getHours()).slice(-2) + ('0'+d.getMinutes()).slice(-2) + ('0'+d.getSeconds()).slice(-2);
}
