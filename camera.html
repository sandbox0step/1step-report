<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASR カメラ</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ASRカメラ">
  <style>
    body {
      font-family: sans-serif; font-size: 16px; margin: 0; background: #fff;
      padding: 12px;
      padding-top:    max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-left:   max(12px, env(safe-area-inset-left));
      padding-right:  max(12px, env(safe-area-inset-right));
    }
    h1 { font-size: 20px; margin: 8px 0 16px; }
    h2 { font-size: 17px; background: #2e7d45; color: #fff; padding: 8px 12px; margin: 20px -12px 12px; }
    label { display: block; font-weight: bold; margin: 10px 0 4px; font-size: 15px; }
    input[type=text] {
      display: block; width: 100%; font-size: 16px;
      padding: 10px; box-sizing: border-box;
      color: #000; background: #fff;
      border: 2px solid #333; border-radius: 4px;
    }

    /* ── Auth bar ── */
    #auth-bar {
      background: #f8fdf9; border: 1px solid #b2d8bc;
      border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
    }
    #auth-desc { font-size: 13px; color: #555; margin: 0 0 10px; line-height: 1.6; }
    .login-btn {
      display: block; width: 100%;
      font-size: 16px; font-weight: bold; padding: 13px;
      background: #1a5c2a; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }
    .login-btn:active { background: #144821; }
    #auth-logged-in { display: none; }
    #auth-user-row { display: flex; align-items: center; gap: 10px; }
    #user-name-display { font-size: 14px; color: #1a5c2a; font-weight: bold; flex: 1; }
    .logout-btn {
      font-size: 13px; padding: 6px 14px;
      background: #fff; color: #c0392b;
      border: 1px solid #c0392b; border-radius: 6px;
      cursor: pointer; -webkit-appearance: none; white-space: nowrap;
    }

    /* ── Settings ── */
    #settings-toggle {
      display: block; font-size: 12px; color: #999; background: none;
      border: none; cursor: pointer; text-decoration: underline;
      margin-top: 10px; padding: 0;
    }
    #settings-panel {
      display: none; margin-top: 10px; padding: 10px 0 0;
      border-top: 1px solid #d8eedd;
    }
    #settings-panel label { font-size: 13px; font-weight: normal; color: #555; margin-bottom: 4px; }
    #client-id-input { font-size: 13px !important; padding: 7px !important; border-width: 1px !important; }
    .settings-save-btn {
      font-size: 13px; padding: 7px 16px; margin-top: 6px;
      background: #e8f5ec; color: #1a5c2a;
      border: 1px solid #a5d6a7; border-radius: 4px;
      cursor: pointer; -webkit-appearance: none;
    }
    .settings-note { font-size: 11px; color: #999; margin: 6px 0 0; line-height: 1.7; }

    /* ── Drive link ── */
    #drive-link-area {
      display: none; padding: 10px 12px; margin: 4px 0 8px;
      background: #e8f5ec; border: 1px solid #a5d6a7; border-radius: 6px;
    }
    .drive-link-label { font-size: 13px; font-weight: bold; color: #1a5c2a; }
    #drive-link { display: block; font-size: 13px; color: #1565c0; word-break: break-all; margin-top: 3px; }

    /* ── Mode buttons ── */
    .mode-btns { display: flex; gap: 8px; margin-bottom: 16px; }
    .mode-btn {
      flex: 1; font-size: 16px; font-weight: bold;
      padding: 14px 8px;
      background: #f5f5f5; color: #555;
      border: 2px solid #ddd; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    .mode-btn.active { background: #1a5c2a; color: #fff; border-color: #1a5c2a; }

    .count-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .count-badge { font-size: 13px; font-weight: bold; padding: 4px 12px; border-radius: 12px; }

    /* ── Camera button ── */
    .cam-btn {
      display: block; width: 100%;
      font-size: 20px; font-weight: bold;
      padding: 22px; margin: 0 0 8px;
      background: #2e7d45; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }
    .cam-btn:active { background: #1a5c2a; }

    /* ── Photo grid ── */
    .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .photo-item { position: relative; width: 120px; }
    .photo-item img {
      width: 120px; height: 120px; object-fit: cover;
      border: 1px solid #aaa; border-radius: 4px; display: block; cursor: pointer;
    }
    .photo-status {
      position: absolute; top: 3px; left: 3px;
      font-size: 10px; font-weight: bold; padding: 2px 5px;
      border-radius: 3px; line-height: 1.4; display: none;
    }
    .photo-status.uploading { background: rgba(0,0,0,0.65); color: #fff; }
    .photo-status.done      { background: rgba(26,92,42,0.85); color: #fff; }
    .photo-status.error     { background: rgba(192,57,43,0.85); color: #fff; }
    .photo-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.6); color: #fff;
      font-size: 10px; padding: 3px 5px;
      border-radius: 0 0 4px 4px; line-height: 1.5;
    }
    .photo-mode-badge {
      display: inline-block; font-size: 10px; font-weight: bold;
      padding: 1px 5px; border-radius: 3px; margin-bottom: 1px;
    }
    .photo-del {
      position: absolute; top: 0; right: 0;
      width: 32px; height: 32px;
      background: rgba(200,0,0,0.85); color: #fff;
      border: none; border-radius: 0 4px 0 6px;
      font-size: 16px; font-weight: bold; line-height: 32px; text-align: center;
      cursor: pointer; -webkit-appearance: none; padding: 0;
    }
    .no-photo { color: #999; font-size: 14px; margin: 4px 0 12px; }

    /* ── Send button ── */
    .send-btn {
      display: block; width: 100%;
      font-size: 17px; font-weight: bold;
      padding: 16px; margin: 8px 0;
      background: #1e8e3e; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }
    .send-btn:disabled { background: #90a4ae; cursor: not-allowed; }
    #send-msg {
      display: none; font-size: 14px; font-weight: bold; text-align: center;
      padding: 8px 12px; border-radius: 6px; margin-bottom: 8px;
    }
    #send-msg.ok  { background: #e8f5ec; color: #1a5c2a; border: 1px solid #a5d6a7; }
    #send-msg.err { background: #fdecea; color: #c0392b; border: 1px solid #ef9a9a; }
  </style>
</head>
<body>

<h1>ASR カメラ</h1>

<!-- ── Google Drive 認証 ── -->
<div id="auth-bar">
  <div id="auth-logged-out">
    <p id="auth-desc">📁 Googleドライブ連携（任意）<br>ログインすると撮影後に自動アップロードされます</p>
    <button class="login-btn" type="button" onclick="signIn()">Googleでログイン（Drive連携）</button>
    <button id="settings-toggle" type="button" onclick="toggleSettings()">⚙ Client ID を設定</button>
    <div id="settings-panel">
      <label for="client-id-input">Google OAuth 2.0 Client ID</label>
      <input type="text" id="client-id-input" placeholder="〇〇〇.apps.googleusercontent.com">
      <button class="settings-save-btn" type="button" onclick="saveClientId()">保存</button>
      <p class="settings-note">
        Google Cloud Console → 「APIとサービス」→「認証情報」<br>
        → 「OAuth クライアント ID を作成」→ アプリの種類：ウェブアプリケーション<br>
        → 「承認済みの JavaScript 生成元」にこのページの URL を追加
      </p>
    </div>
  </div>
  <div id="auth-logged-in">
    <div id="auth-user-row">
      <span id="user-name-display"></span>
      <button class="logout-btn" type="button" onclick="signOut()">ログアウト</button>
    </div>
  </div>
</div>

<!-- ── 現場情報 ── -->
<h2>現場情報</h2>
<label for="site-name">現場名</label>
<input type="text" id="site-name" placeholder="例：○○太陽光発電所">

<!-- ── Drive フォルダリンク（アップロード後に表示） ── -->
<div id="drive-link-area">
  <span class="drive-link-label">📁 Drive フォルダ（共有リンク）</span>
  <a id="drive-link" href="#" target="_blank"></a>
</div>

<!-- ── モード選択 ── -->
<h2>モード選択</h2>
<div class="mode-btns">
  <button class="mode-btn active" id="btn-before" type="button" onclick="setMode('作業前')">作業前</button>
  <button class="mode-btn"        id="btn-after"  type="button" onclick="setMode('作業後')">作業後</button>
  <button class="mode-btn"        id="btn-check"  type="button" onclick="setMode('点検')">点検</button>
</div>
<div class="count-row">
  <span class="count-badge" id="cnt-before" style="background:#dce8ff;color:#1565c0;">作業前: 0枚</span>
  <span class="count-badge" id="cnt-after"  style="background:#fff3e0;color:#e65100;">作業後: 0枚</span>
  <span class="count-badge" id="cnt-check"  style="background:#f3e5f5;color:#6a1b9a;">点検: 0枚</span>
</div>

<!-- ── 撮影 ── -->
<input type="file" id="cam-input" accept="image/*" capture="environment"
       style="display:none" onchange="onCapture(this)">
<button class="cam-btn" type="button"
        onclick="document.getElementById('cam-input').click()">
  📷 撮影（<span id="current-mode-label">作業前</span>）
</button>

<!-- ── 撮影済み写真 ── -->
<h2>撮影済み写真</h2>
<div id="photo-grid" class="photo-grid">
  <p class="no-photo" id="no-photo-msg">まだ写真がありません</p>
</div>

<!-- ── スプレッドシート送信 ── -->
<h2>スプレッドシート送信</h2>
<button class="send-btn" id="send-btn" type="button" onclick="sendToSheet()">
  📊 スプレッドシートに送信
</button>
<div id="send-msg"></div>

<!-- GIS は signIn() 呼び出し時に動的ロード。ページロード時には読み込まない -->
<script>
/* ======================================================
   定数・状態変数
   ====================================================== */
var GAS_URL      = 'https://script.google.com/macros/s/AKfycbxtnLLUlzeMgubyjW4fY9g2Cf2O2yS_P_p1mSOyaXlYUyrul1xm_tDCXVrl-PB3fqYw/exec';
var CLIENT_ID_LS = 'asr_google_client_id';

var accessToken    = null;
var tokenClient    = null;
var currentMode    = '作業前';
var photos         = [];
var photoId        = 0;
var folderCache    = {};
var dateFolderLink = null;

var MODE_CFG = {
  '作業前': { btnId: 'btn-before', cntId: 'cnt-before', bg: '#1565c0' },
  '作業後': { btnId: 'btn-after',  cntId: 'cnt-after',  bg: '#e65100' },
  '点検':   { btnId: 'btn-check',  cntId: 'cnt-check',  bg: '#6a1b9a' }
};

/* ======================================================
   Client ID 設定（localStorage）
   ====================================================== */
function loadClientId() { return localStorage.getItem(CLIENT_ID_LS) || ''; }

function saveClientId() {
  var v = document.getElementById('client-id-input').value.trim();
  if (!v) { alert('Client ID を入力してください'); return; }
  localStorage.setItem(CLIENT_ID_LS, v);
  document.getElementById('settings-panel').style.display = 'none';
  alert('保存しました。ログインボタンを押してください。');
}

function toggleSettings() {
  var p = document.getElementById('settings-panel');
  var show = p.style.display !== 'block';
  p.style.display = show ? 'block' : 'none';
  if (show) document.getElementById('client-id-input').value = loadClientId();
}

/* ======================================================
   Google 認証
   GIS ライブラリをログイン時に動的ロードすることで
   ページ初期表示への影響をゼロにする
   ====================================================== */
function loadGIS(callback) {
  if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
    callback(); return;
  }
  var s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = callback;
  s.onerror = function() {
    alert('Google ライブラリの読み込みに失敗しました。\nネットワーク接続を確認してください。');
  };
  document.head.appendChild(s);
}

function signIn() {
  var clientId = loadClientId();
  if (!clientId) {
    document.getElementById('settings-panel').style.display = 'block';
    document.getElementById('client-id-input').focus();
    alert('先に Client ID を設定してください（⚙ Client ID を設定）');
    return;
  }
  loadGIS(function() {
    if (!tokenClient) {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: [
          'https://www.googleapis.com/auth/drive.file',
          'https://www.googleapis.com/auth/userinfo.profile'
        ].join(' '),
        callback: handleTokenResponse
      });
    }
    tokenClient.requestAccessToken({ prompt: '' });
  });
}

function signOut() {
  if (accessToken && typeof google !== 'undefined') {
    google.accounts.oauth2.revoke(accessToken, function() {});
  }
  accessToken = null;
  tokenClient = null;
  folderCache = {};
  dateFolderLink = null;
  document.getElementById('auth-logged-out').style.display = '';
  document.getElementById('auth-logged-in').style.display  = 'none';
  document.getElementById('drive-link-area').style.display = 'none';
}

function handleTokenResponse(resp) {
  if (resp.error) {
    console.error('Auth error:', resp);
    alert('ログインに失敗しました: ' + (resp.error_description || resp.error));
    return;
  }
  accessToken = resp.access_token;
  document.getElementById('auth-logged-out').style.display = 'none';
  document.getElementById('auth-logged-in').style.display  = 'block';

  fetchUserInfo();

  /* ログイン前に撮影済みの写真を順次アップロード */
  photos.forEach(function(p) {
    if (p.file) {
      showStatus(p.id, 'uploading', '⬆ 待機中');
      uploadPhoto(p.id, p.file, p.mode);
    }
  });
}

function fetchUserInfo() {
  fetch('https://www.googleapis.com/oauth2/v3/userinfo',
        { headers: { 'Authorization': 'Bearer ' + accessToken } })
    .then(function(r) { return r.json(); })
    .then(function(info) {
      document.getElementById('user-name-display').textContent =
        '✅ ' + (info.name || info.email || 'ログイン済み');
    })
    .catch(function() {
      document.getElementById('user-name-display').textContent = '✅ ログイン済み';
    });
}

/* ======================================================
   Drive API ヘルパー
   ====================================================== */
function driveGet(path, params) {
  var url = 'https://www.googleapis.com/drive/v3/' + path;
  if (params) url += '?' + new URLSearchParams(params).toString();
  return fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } })
    .then(function(r) {
      if (r.status === 401) { signOut(); throw new Error('token_expired'); }
      if (!r.ok) throw new Error('Drive GET ' + r.status);
      return r.json();
    });
}

function drivePostJSON(path, body, params) {
  var url = 'https://www.googleapis.com/drive/v3/' + path;
  if (params) url += '?' + new URLSearchParams(params).toString();
  return fetch(url, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r) {
    if (r.status === 401) { signOut(); throw new Error('token_expired'); }
    if (!r.ok) throw new Error('Drive POST ' + r.status);
    return r.json();
  });
}

function findOrCreateFolder(name, parentId) {
  var key = (parentId || 'root') + '/' + name;
  if (folderCache[key]) return Promise.resolve(folderCache[key]);

  var safe = name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  var q = "name='" + safe + "' and mimeType='application/vnd.google-apps.folder' and trashed=false";
  if (parentId) q += " and '" + parentId + "' in parents";

  return driveGet('files', { q: q, fields: 'files(id)', spaces: 'drive' })
    .then(function(res) {
      if (res.files && res.files.length > 0) {
        folderCache[key] = res.files[0].id;
        return res.files[0].id;
      }
      var body = { name: name, mimeType: 'application/vnd.google-apps.folder' };
      if (parentId) body.parents = [parentId];
      return drivePostJSON('files', body, { fields: 'id' }).then(function(created) {
        folderCache[key] = created.id;
        return created.id;
      });
    });
}

function uploadFileToDrive(file, folderId) {
  var ext      = (file.type === 'image/png') ? '.png' : '.jpg';
  var filename = formatDatetimeFile(new Date()) + ext;
  var meta     = JSON.stringify({ name: filename, parents: [folderId] });
  var form     = new FormData();
  form.append('metadata', new Blob([meta], { type: 'application/json' }));
  form.append('file', file);

  return fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
    { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: form }
  ).then(function(r) {
    if (r.status === 401) { signOut(); throw new Error('token_expired'); }
    if (!r.ok) throw new Error('Upload ' + r.status);
    return r.json();
  });
}

function publishFolder(folderId) {
  return fetch('https://www.googleapis.com/drive/v3/files/' + folderId + '/permissions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'anyone', role: 'reader' })
  })
  .catch(function() { /* already public */ })
  .then(function() {
    return driveGet('files/' + folderId, { fields: 'webViewLink' });
  })
  .then(function(data) { return data.webViewLink || null; });
}

/* ASR/[現場名]/[日付]/[モード] のフォルダIDを返す */
function buildFolderPath(mode) {
  var siteName = (document.getElementById('site-name').value.trim()) || '未設定';
  var today    = formatDate(new Date());
  var asrId, siteId, dateId;

  return findOrCreateFolder('ASR', null)
    .then(function(id) { asrId = id;  return findOrCreateFolder(siteName, asrId); })
    .then(function(id) { siteId = id; return findOrCreateFolder(today, siteId); })
    .then(function(id) { dateId = id; return findOrCreateFolder(mode, dateId); })
    .then(function(modeId) { return { modeId: modeId, dateId: dateId }; });
}

/* ======================================================
   撮影・アップロード
   ====================================================== */
function onCapture(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var mode = currentMode;
  var now  = new Date();
  readExifDate(file, function(exifDate) {
    var datetime = exifDate || formatDatetime(now);
    var id  = ++photoId;
    var src = URL.createObjectURL(file);
    photos.push({ id: id, mode: mode, datetime: datetime, src: src, file: file });
    renderPhoto({ id: id, mode: mode, datetime: datetime, src: src });
    updateCounts();
    if (accessToken) uploadPhoto(id, file, mode);
  });
  input.value = '';
}

function uploadPhoto(id, file, mode) {
  showStatus(id, 'uploading', '⬆ アップロード中');
  buildFolderPath(mode)
    .then(function(folders) {
      if (!dateFolderLink) {
        return publishFolder(folders.dateId)
          .then(function(link) {
            dateFolderLink = link;
            if (link) {
              var area = document.getElementById('drive-link-area');
              var el   = document.getElementById('drive-link');
              area.style.display = '';
              el.href        = link;
              el.textContent = link;
            }
            return uploadFileToDrive(file, folders.modeId);
          });
      }
      return uploadFileToDrive(file, folders.modeId);
    })
    .then(function() { showStatus(id, 'done', '✅ 完了'); })
    .catch(function(e) {
      console.error('Drive upload error:', e);
      showStatus(id, 'error', '❌ 失敗');
    });
}

function showStatus(id, cls, text) {
  var el = document.getElementById('photo-status-' + id);
  if (!el) return;
  el.className   = 'photo-status ' + cls;
  el.textContent = text;
  el.style.display = '';
}

/* ======================================================
   UI
   ====================================================== */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('current-mode-label').textContent = mode;
  Object.keys(MODE_CFG).forEach(function(m) {
    document.getElementById(MODE_CFG[m].btnId).classList.toggle('active', m === mode);
  });
}

function renderPhoto(p) {
  var noMsg = document.getElementById('no-photo-msg');
  if (noMsg) noMsg.style.display = 'none';

  var item = document.createElement('div');
  item.className = 'photo-item';
  item.id = 'photo-' + p.id;

  var img = document.createElement('img');
  img.src = p.src;
  img.onclick = (function(s) { return function() { window.open(s, '_blank'); }; })(p.src);

  var status = document.createElement('div');
  status.id = 'photo-status-' + p.id;
  status.className = 'photo-status';

  var cfg = MODE_CFG[p.mode] || { bg: '#333' };
  var meta = document.createElement('div');
  meta.className = 'photo-meta';
  meta.innerHTML =
    '<span class="photo-mode-badge" style="background:' + cfg.bg + ';">' + p.mode + '</span><br>' +
    p.datetime;

  var del = document.createElement('button');
  del.className = 'photo-del';
  del.type = 'button';
  del.textContent = '×';
  del.onclick = (function(xid) { return function() { removePhoto(xid); }; })(p.id);

  item.appendChild(img);
  item.appendChild(status);
  item.appendChild(meta);
  item.appendChild(del);
  document.getElementById('photo-grid').appendChild(item);
}

function removePhoto(id) {
  photos = photos.filter(function(p) { return p.id !== id; });
  var el = document.getElementById('photo-' + id);
  if (el) el.remove();
  updateCounts();
  if (photos.length === 0) {
    var noMsg = document.getElementById('no-photo-msg');
    if (noMsg) noMsg.style.display = '';
  }
}

function updateCounts() {
  var counts = { '作業前': 0, '作業後': 0, '点検': 0 };
  photos.forEach(function(p) { if (p.mode in counts) counts[p.mode]++; });
  document.getElementById('cnt-before').textContent = '作業前: ' + counts['作業前'] + '枚';
  document.getElementById('cnt-after').textContent  = '作業後: ' + counts['作業後'] + '枚';
  document.getElementById('cnt-check').textContent  = '点検: '   + counts['点検']   + '枚';
}

/* ======================================================
   日付・時刻フォーマット
   ====================================================== */
function formatDate(d) {
  return d.getFullYear() + '-' +
    ('0' + (d.getMonth() + 1)).slice(-2) + '-' +
    ('0' + d.getDate()).slice(-2);
}
function formatDatetime(d) {
  return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 ' +
    ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
}
function formatDatetimeFile(d) {
  return d.getFullYear() +
    ('0' + (d.getMonth() + 1)).slice(-2) +
    ('0' + d.getDate()).slice(-2) + '_' +
    ('0' + d.getHours()).slice(-2) +
    ('0' + d.getMinutes()).slice(-2) +
    ('0' + d.getSeconds()).slice(-2);
}

/* ======================================================
   EXIF 撮影日時読み取り（index.html と同一実装）
   ====================================================== */
function readExifDate(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var buf  = e.target.result;
      var view = new DataView(buf);
      if (view.getUint16(0) !== 0xFFD8) { callback(null); return; }
      var offset = 2;
      while (offset < buf.byteLength - 4) {
        var marker = view.getUint16(offset);
        offset += 2;
        if (marker === 0xFFE1) {
          var segLen = view.getUint16(offset);
          if (view.getUint32(offset + 2) === 0x45786966 && view.getUint16(offset + 6) === 0x0000) {
            var ts      = offset + 8;
            var le      = (view.getUint16(ts) === 0x4949);
            var ifd     = ts + view.getUint32(ts + 4, le);
            var n       = view.getUint16(ifd, le);
            var dateStr = null;
            var exifPtr = null;
            for (var i = 0; i < n; i++) {
              var ep  = ifd + 2 + i * 12;
              var tag = view.getUint16(ep, le);
              if (tag === 0x8769) { exifPtr = ts + view.getUint32(ep + 8, le); }
              if (tag === 0x0132) {
                var vo = ts + view.getUint32(ep + 8, le);
                var s  = '';
                for (var j = 0; j < 19; j++) {
                  var ch = view.getUint8(vo + j);
                  if (!ch) break;
                  s += String.fromCharCode(ch);
                }
                dateStr = s;
              }
            }
            if (exifPtr) {
              var ne = view.getUint16(exifPtr, le);
              for (var i2 = 0; i2 < ne; i2++) {
                var ep2  = exifPtr + 2 + i2 * 12;
                var tag2 = view.getUint16(ep2, le);
                if (tag2 === 0x9003) {
                  var vo2 = ts + view.getUint32(ep2 + 8, le);
                  var s2  = '';
                  for (var j2 = 0; j2 < 19; j2++) {
                    var ch2 = view.getUint8(vo2 + j2);
                    if (!ch2) break;
                    s2 += String.fromCharCode(ch2);
                  }
                  dateStr = s2;
                  break;
                }
              }
            }
            if (dateStr) {
              var m = dateStr.match(/^(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2})/);
              if (m) {
                callback(m[1] + '年' + parseInt(m[2]) + '月' + parseInt(m[3]) + '日 ' +
                         m[4] + ':' + m[5]);
                return;
              }
            }
          }
          offset += segLen;
        } else if (marker === 0xFFDA) {
          break;
        } else {
          if (offset + 2 > buf.byteLength) break;
          offset += view.getUint16(offset);
        }
      }
      callback(null);
    } catch (ex) { callback(null); }
  };
  reader.onerror = function() { callback(null); };
  reader.readAsArrayBuffer(file.slice(0, 65536));
}

/* ======================================================
   スプレッドシート送信（Drive リンクも含める）
   ====================================================== */
function sendToSheet() {
  var btn = document.getElementById('send-btn');
  var msg = document.getElementById('send-msg');

  if (photos.length === 0) {
    msg.textContent   = '写真がありません';
    msg.className     = 'err';
    msg.style.display = 'block';
    return;
  }

  btn.disabled      = true;
  btn.textContent   = '送信中...';
  msg.style.display = 'none';
  msg.className     = '';

  var counts = { '作業前': 0, '作業後': 0, '点検': 0 };
  photos.forEach(function(p) { if (p.mode in counts) counts[p.mode]++; });

  var payload = {
    type:        'camera_asr',
    capturedAt:  new Date().toISOString(),
    siteName:    (document.getElementById('site-name').value.trim()) || '',
    driveLink:   dateFolderLink || '',
    countBefore: counts['作業前'],
    countAfter:  counts['作業後'],
    countCheck:  counts['点検'],
    totalCount:  photos.length,
    photos:      photos.map(function(p) { return { mode: p.mode, datetime: p.datetime }; })
  };

  var controller = new AbortController();
  var timer = setTimeout(function() { controller.abort(); }, 15000);

  fetch(GAS_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body:    JSON.stringify(payload),
    signal:  controller.signal
  })
  .then(function() {
    clearTimeout(timer);
    msg.textContent   = '✅ 送信しました！';
    msg.className     = 'ok';
  })
  .catch(function() {
    clearTimeout(timer);
    msg.textContent   = '❌ 送信に失敗しました';
    msg.className     = 'err';
  })
  .finally(function() {
    btn.disabled      = false;
    btn.textContent   = '📊 スプレッドシートに送信';
    msg.style.display = 'block';
  });
}
