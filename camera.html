<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASR カメラ</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ASRカメラ">
  <!-- exifr lite: EXIF（撮影日時・GPS）の読み取りに使用 -->
  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: sans-serif; font-size: 16px; margin: 0; background: #fff;
      padding: 12px;
      padding-top:    max(12px, env(safe-area-inset-top));
      padding-bottom: max(60px, env(safe-area-inset-bottom));
      padding-left:   max(12px, env(safe-area-inset-left));
      padding-right:  max(12px, env(safe-area-inset-right));
    }
    h1 { font-size: 20px; margin: 8px 0 10px; }
    h2 { font-size: 16px; background: #2e7d45; color: #fff; padding: 8px 12px; margin: 20px -12px 12px; }
    label { display: block; font-weight: bold; margin: 10px 0 4px; font-size: 15px; }
    input[type=text] {
      display: block; width: 100%; font-size: 16px;
      padding: 10px; color: #000; background: #fff;
      border: 2px solid #333; border-radius: 4px;
    }

    /* ── GPS ステータス ── */
    #gps-status {
      font-size: 12px; padding: 6px 10px; border-radius: 4px; margin-bottom: 12px;
      background: #f0f4f8; border: 1px solid #b0bec5; color: #555;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #gps-status.ok  { background: #e8f5ec; border-color: #a5d6a7; color: #1a5c2a; }
    #gps-status.err { background: #fdecea; border-color: #ef9a9a; color: #c0392b; }

    /* ── モードボタン ── */
    .mode-btns { display: flex; gap: 8px; margin-bottom: 14px; }
    .mode-btn {
      flex: 1; font-size: 15px; font-weight: bold; padding: 14px 4px;
      background: #f5f5f5; color: #555;
      border: 2px solid #ddd; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    .mode-btn.active { color: #fff; border-color: transparent; }
    #btn-before.active { background: #1565c0; }
    #btn-after.active  { background: #e65100; }
    #btn-check.active  { background: #6a1b9a; }

    .count-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .count-badge { font-size: 13px; font-weight: bold; padding: 4px 12px; border-radius: 12px; }

    /* ── 写真選択ボタン ── */
    .select-btn {
      display: block; width: 100%; font-size: 19px; font-weight: bold;
      padding: 20px; margin: 0 0 8px;
      background: #2e7d45; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    .select-btn:active   { background: #1a5c2a; }
    .select-btn:disabled { background: #90a4ae; cursor: not-allowed; }

    /* ── 写真グリッド ── */
    .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .photo-item { position: relative; width: 110px; flex-shrink: 0; }
    .photo-item img {
      width: 110px; height: 110px; object-fit: cover;
      border: 1px solid #aaa; border-radius: 4px; display: block; cursor: pointer;
    }
    .photo-status {
      position: absolute; top: 3px; left: 3px;
      font-size: 10px; font-weight: bold; padding: 2px 5px;
      border-radius: 3px; line-height: 1.4; display: none;
    }
    .photo-status.pending   { background: rgba(150,80,0,0.82);  color: #fff; display: block; }
    .photo-status.uploading { background: rgba(0,0,0,0.65);     color: #fff; display: block; }
    .photo-status.done      { background: rgba(26,92,42,0.82);  color: #fff; display: block; }
    .photo-status.error     { background: rgba(192,57,43,0.82); color: #fff; display: block; }
    .photo-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.62); color: #fff;
      font-size: 9px; padding: 3px 5px;
      border-radius: 0 0 4px 4px; line-height: 1.45;
    }
    .photo-mode-badge {
      display: inline-block; font-size: 10px; font-weight: bold;
      padding: 1px 5px; border-radius: 3px; margin-bottom: 1px;
    }
    .photo-del {
      position: absolute; top: 0; right: 0;
      width: 30px; height: 30px;
      background: rgba(200,0,0,0.85); color: #fff;
      border: none; border-radius: 0 4px 0 6px;
      font-size: 16px; font-weight: bold; line-height: 30px; text-align: center;
      cursor: pointer; -webkit-appearance: none; padding: 0;
    }
    .no-photo { color: #999; font-size: 14px; margin: 4px 0 12px; }

    /* ── 反映ボタン ── */
    .apply-btn {
      display: block; width: 100%; font-size: 19px; font-weight: bold;
      padding: 20px; margin: 0 0 8px;
      background: #1565c0; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
    }
    .apply-btn:active   { background: #0d47a1; }
    .apply-btn:disabled { background: #90a4ae; cursor: not-allowed; }

    /* ── プログレス ── */
    #progress-area {
      display: none; font-size: 14px; font-weight: bold; text-align: center;
      padding: 10px 12px; margin-bottom: 8px;
      background: #e3f2fd; border: 1px solid #90caf9; border-radius: 6px;
    }
    #progress-bar-outer { background: #bbdefb; border-radius: 4px; height: 8px; margin-top: 6px; }
    #progress-bar       { background: #1565c0; height: 8px; border-radius: 4px; width: 0; transition: width 0.25s; }

    /* ── 反映結果メッセージ ── */
    #apply-msg {
      display: none; font-size: 14px; font-weight: bold; text-align: center;
      padding: 8px 12px; border-radius: 6px; margin-bottom: 8px;
    }
    #apply-msg.ok  { background: #e8f5ec; color: #1a5c2a; border: 1px solid #a5d6a7; }
    #apply-msg.err { background: #fdecea; color: #c0392b; border: 1px solid #ef9a9a; }

    /* ── ASR セクション（反映後に表示） ── */
    #asr-section { display: none; }

    /* モード別ブロック */
    .asr-mode-block { margin-bottom: 20px; }
    .asr-mode-header {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 8px;
    }
    .asr-mode-title { font-size: 15px; font-weight: bold; }
    .asr-mode-count { font-size: 13px; color: #666; }

    /* 代表写真グリッド */
    .rep-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .rep-item { position: relative; width: 110px; flex-shrink: 0; }
    .rep-item img {
      width: 110px; height: 110px; object-fit: cover;
      border-radius: 4px; display: block; cursor: pointer;
    }
    .asr-mode-block[data-mode="作業前"] .rep-item img { border: 2px solid #1565c0; }
    .asr-mode-block[data-mode="作業後"] .rep-item img { border: 2px solid #e65100; }
    .asr-mode-block[data-mode="点検"]   .rep-item img { border: 2px solid #6a1b9a; }

    /* アルバムURLリンク */
    .album-url-row {
      display: none; /* GASからリンクが返った場合のみ表示 */
      align-items: stretch; gap: 8px; margin-top: 4px;
    }
    .album-url-row.visible { display: flex; }
    .album-url-label { font-size: 12px; font-weight: bold; color: #1a5c2a; margin-bottom: 4px; }
    .album-url {
      flex: 1; font-size: 12px; color: #1565c0; font-family: monospace;
      padding: 8px; border: 1px solid #a5d6a7; border-radius: 4px;
      background: #f0fff4; word-break: break-all;
      resize: none; min-height: 38px;
    }
    .copy-btn {
      font-size: 13px; font-weight: bold; white-space: nowrap;
      padding: 8px 14px; background: #1e8e3e; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; -webkit-appearance: none;
    }
    .copy-btn:active { background: #1a5c2a; }

    /* 区切り線 */
    .asr-divider { border: none; border-top: 1px solid #ddd; margin: 16px 0; }
  </style>
</head>
<body>

<h1>ASR カメラ</h1>

<div id="gps-status">📍 GPS: 取得中...</div>

<!-- ── 現場情報 ── -->
<h2>現場情報</h2>
<label for="site-name">現場名
  <span style="font-weight:normal;font-size:12px;color:#888;">（Driveフォルダ名になります）</span>
</label>
<input type="text" id="site-name" placeholder="例：○○太陽光発電所">

<!-- ── モード選択 ── -->
<h2>モード選択</h2>
<div class="mode-btns">
  <button class="mode-btn active" id="btn-before" type="button" onclick="setMode('作業前')">作業前</button>
  <button class="mode-btn"        id="btn-after"  type="button" onclick="setMode('作業後')">作業後</button>
  <button class="mode-btn"        id="btn-check"  type="button" onclick="setMode('点検')">点検</button>
</div>
<div class="count-row">
  <span class="count-badge" id="cnt-before" style="background:#dce8ff;color:#1565c0;">作業前: 0枚</span>
  <span class="count-badge" id="cnt-after"  style="background:#fff3e0;color:#e65100;">作業後: 0枚</span>
  <span class="count-badge" id="cnt-check"  style="background:#f3e5f5;color:#6a1b9a;">点検: 0枚</span>
</div>

<!-- ── 写真選択（複数枚・カメラロールから） ── -->
<input type="file" id="cam-input" accept="image/*" multiple style="display:none"
       onchange="onFileSelect(this)">
<button id="select-btn" class="select-btn" type="button"
        onclick="document.getElementById('cam-input').click()">
  📂 写真を選択（<span id="current-mode-label">作業前</span>・複数可）
</button>

<!-- ── 選択済み写真 ── -->
<h2>選択済み写真</h2>
<div id="photo-grid" class="photo-grid">
  <p class="no-photo" id="no-photo-msg">まだ写真がありません</p>
</div>

<!-- ── 反映ボタン ── -->
<h2>反映・記録</h2>
<button class="apply-btn" id="apply-btn" type="button" onclick="applyAll()">
  ✅ 反映（Drive保存 ＋ シート記録）
</button>
<div id="progress-area">
  <span id="progress-text">処理中...</span>
  <div id="progress-bar-outer"><div id="progress-bar"></div></div>
</div>
<div id="apply-msg"></div>

<!-- ── ASR 代表写真・アルバムリンク（反映後に表示） ── -->
<div id="asr-section">
  <h2>ASR 代表写真・アルバムリンク</h2>

  <!-- 作業前 -->
  <div id="asr-before" class="asr-mode-block" data-mode="作業前" style="display:none">
    <div class="asr-mode-header">
      <span class="asr-mode-title" style="color:#1565c0;">■ 作業前</span>
      <span class="asr-mode-count"></span>
    </div>
    <div class="rep-grid"></div>
    <div class="album-url-label">📁 アルバムURL</div>
    <div class="album-url-row">
      <textarea class="album-url" readonly rows="2"></textarea>
      <button class="copy-btn" type="button" onclick="copyLink(this)">コピー</button>
    </div>
  </div>

  <hr class="asr-divider" id="div-after" style="display:none">

  <!-- 作業後 -->
  <div id="asr-after" class="asr-mode-block" data-mode="作業後" style="display:none">
    <div class="asr-mode-header">
      <span class="asr-mode-title" style="color:#e65100;">■ 作業後</span>
      <span class="asr-mode-count"></span>
    </div>
    <div class="rep-grid"></div>
    <div class="album-url-label">📁 アルバムURL</div>
    <div class="album-url-row">
      <textarea class="album-url" readonly rows="2"></textarea>
      <button class="copy-btn" type="button" onclick="copyLink(this)">コピー</button>
    </div>
  </div>

  <hr class="asr-divider" id="div-check" style="display:none">

  <!-- 点検 -->
  <div id="asr-check" class="asr-mode-block" data-mode="点検" style="display:none">
    <div class="asr-mode-header">
      <span class="asr-mode-title" style="color:#6a1b9a;">■ 点検</span>
      <span class="asr-mode-count"></span>
    </div>
    <div class="rep-grid"></div>
    <div class="album-url-label">📁 アルバムURL</div>
    <div class="album-url-row">
      <textarea class="album-url" readonly rows="2"></textarea>
      <button class="copy-btn" type="button" onclick="copyLink(this)">コピー</button>
    </div>
  </div>
</div>

<script>
/* ======================================================
   設定
   ====================================================== */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxtnLLUlzeMgubyjW4fY9g2Cf2O2yS_P_p1mSOyaXlYUyrul1xm_tDCXVrl-PB3fqYw/exec';

/* ======================================================
   状態変数
   ====================================================== */
var currentMode     = '作業前';
var photos          = [];   /* {id, mode, datetime, dateObj, gps, src, file, uploaded} */
var photoId         = 0;
var gpsCoords       = null; /* watchPosition で更新 */
var modeFolderLinks = { '作業前': null, '作業後': null, '点検': null };

var MODE_CFG = {
  '作業前': { btnId: 'btn-before', cntId: 'cnt-before', bg: '#1565c0', blockId: 'asr-before', divId: null      },
  '作業後': { btnId: 'btn-after',  cntId: 'cnt-after',  bg: '#e65100', blockId: 'asr-after',  divId: 'div-after' },
  '点検':   { btnId: 'btn-check',  cntId: 'cnt-check',  bg: '#6a1b9a', blockId: 'asr-check',  divId: 'div-check' }
};

/* ======================================================
   GPS: watchPosition で常時更新（許可は初回のみ）
   ====================================================== */
function initGPS() {
  var el = document.getElementById('gps-status');
  if (!navigator.geolocation) {
    el.textContent = '📍 GPS: このブラウザはGPS非対応';
    el.className   = 'err';
    return;
  }
  navigator.geolocation.watchPosition(
    function(pos) {
      gpsCoords = {
        lat: pos.coords.latitude.toFixed(6),
        lng: pos.coords.longitude.toFixed(6),
        acc: Math.round(pos.coords.accuracy)
      };
      el.textContent = '📍 ' + gpsCoords.lat + ', ' + gpsCoords.lng + '（精度 ±' + gpsCoords.acc + 'm）';
      el.className   = 'ok';
    },
    function() {
      el.textContent = '📍 GPS: 取得失敗（設定 → 位置情報を許可してください）';
      el.className   = 'err';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
  );
}

/* ======================================================
   モード切り替え
   ====================================================== */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('current-mode-label').textContent = mode;
  Object.keys(MODE_CFG).forEach(function(m) {
    document.getElementById(MODE_CFG[m].btnId).classList.toggle('active', m === mode);
  });
}

/* ======================================================
   写真選択（複数枚）
   - exifr で撮影日時・GPS を一括取得
   - EXIFにGPSがない場合は現在地を使用
   - 全枚数にモードを一括タグ付け
   ====================================================== */
async function onFileSelect(input) {
  var files = Array.from(input.files || []);
  if (!files.length) return;

  var mode    = currentMode;
  var btn     = document.getElementById('select-btn');
  var noMsg   = document.getElementById('no-photo-msg');
  btn.disabled    = true;
  btn.textContent = '📂 読み込み中 (0/' + files.length + ')...';

  var done    = 0;
  var results = [];

  try {
    /* 並列でEXIF読み取り（GPSと撮影日時） */
    results = await Promise.all(files.map(async function(file) {
      var item = await extractFileData(file, mode);
      done++;
      btn.textContent = '📂 読み込み中 (' + done + '/' + files.length + ')...';
      return item;
    }));
  } catch (e) {
    console.error('File processing error:', e);
  }

  /* 選択順にフォトリストへ追加・描画 */
  var fragment = document.createDocumentFragment();
  results.forEach(function(r) {
    if (!r) return;
    photos.push(r);
    fragment.appendChild(buildPhotoItem(r));
  });
  document.getElementById('photo-grid').appendChild(fragment);
  if (results.length && noMsg) noMsg.style.display = 'none';
  updateCounts();

  btn.disabled    = false;
  btn.textContent = '📂 写真を選択（' + mode + '・複数可）';
  input.value     = '';
}

/* ======================================================
   1ファイルのデータ抽出
   ====================================================== */
async function extractFileData(file, mode) {
  var now      = new Date();
  var datetime = null;
  var dateObj  = null;
  var gps      = null;

  try {
    if (typeof exifr !== 'undefined') {
      var results = await Promise.all([
        exifr.gps(file).catch(function() { return null; }),
        exifr.parse(file, { pick: ['DateTimeOriginal'] }).catch(function() { return null; })
      ]);
      var exifGps  = results[0];
      var exifTags = results[1];

      if (exifTags && exifTags.DateTimeOriginal) {
        dateObj  = new Date(exifTags.DateTimeOriginal);
        datetime = formatDatetime(dateObj);
      }
      if (exifGps && exifGps.latitude != null && exifGps.longitude != null) {
        gps = { lat: exifGps.latitude.toFixed(6), lng: exifGps.longitude.toFixed(6), src: 'EXIF' };
      }
    }
  } catch (e) { /* EXIF失敗は無視 */ }

  if (!dateObj)  { dateObj = now; }
  if (!datetime) { datetime = formatDatetime(now); }
  if (!gps && gpsCoords) {
    gps = { lat: gpsCoords.lat, lng: gpsCoords.lng, acc: gpsCoords.acc, src: '現在地' };
  }

  var id  = ++photoId;
  var src = URL.createObjectURL(file);
  return { id: id, mode: mode, datetime: datetime, dateObj: dateObj, gps: gps, src: src, file: file, uploaded: false };
}

/* ======================================================
   サムネイル DOM 生成
   ====================================================== */
function buildPhotoItem(p) {
  var item = document.createElement('div');
  item.className = 'photo-item';
  item.id = 'photo-' + p.id;

  var img = document.createElement('img');
  img.src     = p.src;
  img.loading = 'lazy';
  img.onclick = (function(s) { return function() { window.open(s, '_blank'); }; })(p.src);

  var status = document.createElement('div');
  status.id        = 'photo-status-' + p.id;
  status.className = 'photo-status pending';
  status.textContent = '未送信';

  var cfg     = MODE_CFG[p.mode] || { bg: '#333' };
  var gpsLine = p.gps ? ('<br>📍' + p.gps.lat + ',' + p.gps.lng) : '';
  var meta    = document.createElement('div');
  meta.className = 'photo-meta';
  meta.innerHTML =
    '<span class="photo-mode-badge" style="background:' + cfg.bg + ';">' + p.mode + '</span><br>' +
    p.datetime + gpsLine;

  var del = document.createElement('button');
  del.className   = 'photo-del';
  del.type        = 'button';
  del.textContent = '×';
  del.onclick = (function(xid) { return function() { removePhoto(xid); }; })(p.id);

  item.appendChild(img);
  item.appendChild(status);
  item.appendChild(meta);
  item.appendChild(del);
  return item;
}

function showStatus(id, cls, text) {
  var el = document.getElementById('photo-status-' + id);
  if (!el) return;
  el.className   = 'photo-status ' + cls;
  el.textContent = text;
}

function removePhoto(id) {
  photos = photos.filter(function(p) { return p.id !== id; });
  var el = document.getElementById('photo-' + id);
  if (el) el.remove();
  updateCounts();
  if (!photos.length) {
    var noMsg = document.getElementById('no-photo-msg');
    if (noMsg) noMsg.style.display = '';
  }
}

function updateCounts() {
  var counts = { '作業前': 0, '作業後': 0, '点検': 0 };
  photos.forEach(function(p) { if (p.mode in counts) counts[p.mode]++; });
  document.getElementById('cnt-before').textContent = '作業前: ' + counts['作業前'] + '枚';
  document.getElementById('cnt-after').textContent  = '作業後: ' + counts['作業後'] + '枚';
  document.getElementById('cnt-check').textContent  = '点検: '   + counts['点検']   + '枚';
}

/* ======================================================
   「反映」: アップロード → 代表5枚表示 → シート記録
   失敗した写真のみ再実行可能
   ====================================================== */
async function applyAll() {
  var btn     = document.getElementById('apply-btn');
  var progEl  = document.getElementById('progress-area');
  var progTxt = document.getElementById('progress-text');
  var progBar = document.getElementById('progress-bar');

  document.getElementById('apply-msg').style.display = 'none';

  if (!photos.length)                             { showMsg('写真がありません', 'err'); return; }
  if (!document.getElementById('site-name').value.trim()) { showMsg('現場名を入力してください', 'err'); return; }

  var siteName = document.getElementById('site-name').value.trim();
  var pending  = photos.filter(function(p) { return !p.uploaded; });

  if (!pending.length) {
    showMsg('未送信の写真はありません（すでに反映済み）', 'ok');
    renderASR();
    return;
  }

  btn.disabled        = true;
  progEl.style.display = '';
  progBar.style.width  = '0';

  var done = 0, failCount = 0;

  for (var i = 0; i < pending.length; i++) {
    var photo = pending[i];
    progTxt.textContent = done + ' / ' + pending.length + ' 枚完了';
    progBar.style.width  = Math.round((done / pending.length) * 100) + '%';
    showStatus(photo.id, 'uploading', '⬆ 送信中');

    try {
      var link = await uploadOnePhoto(photo, siteName);
      photo.uploaded = true;
      if (link) modeFolderLinks[photo.mode] = link;
      done++;
      showStatus(photo.id, 'done', '✅ 完了');
    } catch (err) {
      failCount++;
      showStatus(photo.id, 'error', '❌ 失敗');
      console.error('Upload failed photo=' + photo.id, err);
    }
  }

  progTxt.textContent = done + ' / ' + pending.length + ' 枚完了';
  progBar.style.width  = '100%';

  /* スプレッドシート記録 */
  progTxt.textContent = 'スプレッドシートに記録中...';
  try { await sendToSheetAsync(siteName); } catch (e) { console.warn('Sheet send failed:', e); }

  progEl.style.display = 'none';
  btn.disabled         = false;

  renderASR();

  if (!failCount) {
    showMsg('✅ ' + done + '枚をDriveに保存し、シートに記録しました！', 'ok');
  } else {
    showMsg('⚠ ' + failCount + '枚の送信に失敗しました。再度「反映」を押してリトライできます。', 'err');
  }
}

/* ======================================================
   写真1枚を圧縮して GAS にアップロード
   モードフォルダの共有URLを返す
   ====================================================== */
function uploadOnePhoto(photo, siteName) {
  return new Promise(function(resolve, reject) {
    compressImage(photo.file, function(blob) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64  = e.target.result.replace(/^data:[^;]+;base64,/, '');
        var gpsTag  = photo.gps ? ('_GPS' + photo.gps.lat + 'N' + photo.gps.lng + 'E') : '';
        var fname   = formatDatetimeFile(photo.dateObj) + gpsTag + '.jpg';

        var payload = JSON.stringify({
          type:      'camera_photo',
          imageData: base64,
          mimeType:  'image/jpeg',
          filename:  fname,
          mode:      photo.mode,
          siteName:  siteName,
          date:      formatDate(new Date()),
          lat:       photo.gps ? photo.gps.lat : '',
          lng:       photo.gps ? photo.gps.lng : ''
        });

        var ctrl  = new AbortController();
        var timer = setTimeout(function() { ctrl.abort(); }, 90000);

        fetch(GAS_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'text/plain' },
          body:    payload,
          signal:  ctrl.signal
        })
        .then(function(r) {
          clearTimeout(timer);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function(res) {
          if (res.status !== 'ok') throw new Error(res.message || 'GAS error');
          resolve(res.link || null);
        })
        .catch(function(err) { clearTimeout(timer); reject(err); });
      };
      reader.onerror = function() { reject(new Error('FileReader error')); };
      reader.readAsDataURL(blob);
    });
  });
}

/* ======================================================
   スプレッドシートにカテゴリ別3行を送信
   行: カテゴリ名 | アルバムURL
   ====================================================== */
function sendToSheetAsync(siteName) {
  return new Promise(function(resolve, reject) {
    var counts = { '作業前': 0, '作業後': 0, '点検': 0 };
    photos.forEach(function(p) { if (p.mode in counts) counts[p.mode]++; });

    var modes = ['作業前', '作業後', '点検']
      .map(function(name) {
        return { name: name, count: counts[name], url: modeFolderLinks[name] || '' };
      })
      .filter(function(m) { return m.count > 0; });

    var payload = JSON.stringify({
      type:     'camera_asr',
      siteName: siteName,
      date:     formatDate(new Date()),
      modes:    modes
    });

    var ctrl  = new AbortController();
    var timer = setTimeout(function() { ctrl.abort(); }, 15000);

    fetch(GAS_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body:    payload,
      signal:  ctrl.signal
    })
    .then(function() { clearTimeout(timer); resolve(); })
    .catch(function(err) { clearTimeout(timer); reject(err); });
  });
}

/* ======================================================
   ASR セクションを描画（反映後に呼び出し）
   各モードの代表5枚 + アルバムURL を表示
   ====================================================== */
function renderASR() {
  var anyVisible = false;

  ['作業前', '作業後', '点検'].forEach(function(mode) {
    var cfg        = MODE_CFG[mode];
    var block      = document.getElementById(cfg.blockId);
    var modePhotos = photos.filter(function(p) { return p.mode === mode; });
    var link       = modeFolderLinks[mode];

    if (!modePhotos.length && !link) {
      block.style.display = 'none';
      if (cfg.divId) document.getElementById(cfg.divId).style.display = 'none';
      return;
    }

    /* 枚数ラベル */
    block.querySelector('.asr-mode-count').textContent = '（' + modePhotos.length + '枚）';

    /* 代表5枚グリッド（時系列均等抽出） */
    var grid = block.querySelector('.rep-grid');
    grid.innerHTML = '';
    pickRepresentative(modePhotos).forEach(function(p) {
      var item = document.createElement('div');
      item.className = 'rep-item';
      var img = document.createElement('img');
      img.src     = p.src;
      img.loading = 'lazy';
      img.onclick = (function(s) { return function() { window.open(s, '_blank'); }; })(p.src);
      var meta = document.createElement('div');
      meta.className = 'photo-meta';
      meta.innerHTML = '<span class="photo-mode-badge" style="background:' + cfg.bg + ';">' + mode + '</span><br>' + p.datetime;
      item.appendChild(img);
      item.appendChild(meta);
      grid.appendChild(item);
    });

    /* アルバムURL */
    var row = block.querySelector('.album-url-row');
    if (link) {
      block.querySelector('.album-url').value = link;
      row.classList.add('visible');
    } else {
      row.classList.remove('visible');
    }

    block.style.display = '';
    if (cfg.divId && anyVisible) document.getElementById(cfg.divId).style.display = '';
    anyVisible = true;
  });

  var sec = document.getElementById('asr-section');
  sec.style.display = anyVisible ? '' : 'none';
  if (anyVisible) setTimeout(function() { sec.scrollIntoView({ behavior: 'smooth' }); }, 120);
}

/* ======================================================
   代表写真5枚を時系列で均等抽出
   ====================================================== */
function pickRepresentative(modePhotos) {
  if (modePhotos.length <= 5) return modePhotos.slice();

  /* 撮影日時昇順にソート */
  var sorted = modePhotos.slice().sort(function(a, b) {
    return (a.dateObj ? a.dateObj.getTime() : 0) - (b.dateObj ? b.dateObj.getTime() : 0);
  });

  var result = [];
  var step   = (sorted.length - 1) / 4;
  for (var i = 0; i < 5; i++) {
    result.push(sorted[Math.round(i * step)]);
  }
  return result;
}

/* ======================================================
   アルバムURLをクリップボードにコピー
   ====================================================== */
function copyLink(btnEl) {
  var ta   = btnEl.parentElement.querySelector('.album-url');
  var text = ta ? ta.value : '';
  if (!text) return;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(function() {
        var orig = btnEl.textContent;
        btnEl.textContent = '完了!';
        setTimeout(function() { btnEl.textContent = orig; }, 1500);
      })
      .catch(function() { fallbackCopy(ta); });
  } else {
    fallbackCopy(ta);
  }
}

function fallbackCopy(ta) {
  ta.select();
  ta.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); alert('コピーしました'); }
  catch (e) { alert('手動でコピーしてください'); }
}

/* ======================================================
   メッセージ表示
   ====================================================== */
function showMsg(text, cls) {
  var el = document.getElementById('apply-msg');
  el.textContent   = text;
  el.className     = cls;
  el.style.display = 'block';
}

/* ======================================================
   写真圧縮（最大1920px・JPEG 0.75）
   ====================================================== */
function compressImage(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var MAX    = 1920;
      var scale  = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
      var w      = Math.round(img.naturalWidth  * scale);
      var h      = Math.round(img.naturalHeight * scale);
      var canvas = document.createElement('canvas');
      canvas.width  = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(function(blob) { callback(blob); }, 'image/jpeg', 0.75);
    };
    img.onerror = function() { callback(file); };
    img.src = e.target.result;
  };
  reader.onerror = function() { callback(file); };
  reader.readAsDataURL(file);
}

/* ======================================================
   日付・時刻フォーマット
   ====================================================== */
function formatDate(d) {
  return d.getFullYear() + '-' +
    ('0' + (d.getMonth() + 1)).slice(-2) + '-' +
    ('0' + d.getDate()).slice(-2);
}
function formatDatetime(d) {
  return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 ' +
    ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
}
function formatDatetimeFile(d) {
  return d.getFullYear() +
    ('0' + (d.getMonth() + 1)).slice(-2) +
    ('0' + d.getDate()).slice(-2) + '_' +
    ('0' + d.getHours()).slice(-2) +
    ('0' + d.getMinutes()).slice(-2) +
    ('0' + d.getSeconds()).slice(-2);
}
