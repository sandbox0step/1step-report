<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>除草作業 完了報告書</title>

  <!-- ===== PWA: iPhoneホーム画面アプリ化 ===== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="除草報告書">
  <link rel="apple-touch-icon" id="touch-icon">
  <!-- Web App Manifest（Android / Chrome 対応） -->
  <link rel="manifest" href="manifest.json">
  <style>
    /* ===== 共通 ===== */
    body {
      font-family: sans-serif; font-size: 16px; margin: 0; background: #fff;
      padding: 12px;
      padding-top:    max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-left:   max(12px, env(safe-area-inset-left));
      padding-right:  max(12px, env(safe-area-inset-right));
    }
    h1 { font-size: 20px; margin: 8px 0 16px; }
    h2 { font-size: 17px; background: #2e7d45; color: #fff; padding: 8px 12px; margin: 20px -12px 12px; }
    h3 { font-size: 16px; color: #1a5c2a; border-left: 4px solid #2e7d45; padding-left: 8px; margin: 14px 0 6px; }
    label { display: block; font-weight: bold; margin: 10px 0 4px; font-size: 16px; }
    input[type=text],
    input[type=date],
    input[type=time],
    input[type=password],
    textarea {
      display: block; width: 100%; font-size: 16px;
      padding: 10px; box-sizing: border-box;
      color: #000; background: #fff;
      border: 2px solid #333; border-radius: 4px;
    }
    textarea { min-height: 80px; resize: vertical; }
    input[type=file] { display: block; font-size: 16px; margin: 8px 0; width: 100%; }

    /* ===== ログイン画面 ===== */
    #view-login {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100svh; padding: 24px; box-sizing: border-box;
    }
    .login-box {
      width: 100%; max-width: 360px;
      background: #f8fdf9; border: 1px solid #b2d8bc;
      border-radius: 12px; padding: 32px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .login-box .logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-box .logo-icon {
      font-size: 48px; display: block; margin-bottom: 6px;
    }
    .login-box .logo-title {
      font-size: 18px; font-weight: bold; color: #1a5c2a;
    }
    .login-box .logo-sub {
      font-size: 13px; color: #666; margin-top: 4px;
    }
    .login-btn {
      display: block; width: 100%;
      font-size: 17px; font-weight: bold;
      padding: 14px; margin-top: 16px;
      background: #1a5c2a; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none;
      box-sizing: border-box;
    }
    .login-btn:active { background: #144821; }
    #login-error {
      display: none; color: #c0392b;
      font-size: 14px; text-align: center;
      margin-top: 12px; font-weight: bold;
    }
    #logged-user-badge {
      display: none;
      font-size: 13px; color: #555; text-align: right;
      margin-bottom: 4px;
    }

    /* ===== 看板テキスト貼り付けエリア ===== */
    .parse-btn {
      display: block; width: 100%;
      font-size: 15px; font-weight: bold;
      padding: 12px; margin-top: 8px;
      background: #f9a825; color: #fff;
      border: none; border-radius: 6px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }
    .field-highlight { background: #fffde7 !important; transition: background 0.3s; }

    /* ===== エリアヘッダー ===== */
    .area-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #2e7d45; color: #fff; padding: 8px 12px; margin: 20px -12px 12px;
    }
    .area-header span { font-size: 17px; font-weight: bold; }
    .area-del-btn {
      font-size: 13px; padding: 4px 10px;
      background: #fff; color: #c0392b;
      border: 1px solid #c0392b; border-radius: 4px;
      cursor: pointer; -webkit-appearance: none; white-space: nowrap;
    }
    .add-area-btn {
      display: block; width: 100%;
      font-size: 17px; font-weight: bold;
      padding: 16px; margin: 8px 0 24px;
      background: #e8f5ec; color: #1a5c2a;
      border: 2px dashed #2e7d45; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }

    /* ===== フォームの写真プレビュー ===== */
    .prev { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 10px; }
    .prev-item { position: relative; display: inline-block; }
    .prev img { width: 120px; height: 120px; object-fit: cover; border: 1px solid #aaa; border-radius: 4px; display: block; }

    .prev-del {
      position: absolute; top: 0; right: 0;
      width: 44px; height: 44px;
      background: rgba(200,0,0,0.85); color: #fff;
      border: none; border-radius: 0 4px 0 6px;
      font-size: 20px; font-weight: bold; line-height: 44px; text-align: center;
      cursor: pointer; -webkit-appearance: none; padding: 0;
    }

    /* ===== 生成ボタン ===== */
    .gen-btn {
      display: block; width: 100%;
      font-size: 20px; font-weight: bold;
      padding: 22px; margin: 24px 0;
      background: #1a5c2a; color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; -webkit-appearance: none; box-sizing: border-box;
    }

    /* ===== 完了バナー ===== */
    #done-banner {
      display: none;
      background: #1a6ed8; color: #fff;
      font-size: 16px; font-weight: bold;
      padding: 16px; text-align: center;
      line-height: 1.7;
      position: sticky; top: 0; z-index: 100;
    }
    #back-btn {
      display: none;
      font-size: 15px; padding: 10px 20px;
      background: #fff; color: #1a5c2a;
      border: 2px solid #1a5c2a; border-radius: 6px;
      cursor: pointer; -webkit-appearance: none;
      margin: 12px 0;
    }
    #pdf-btn {
      display: none;
      font-size: 15px; font-weight: bold; padding: 10px 20px;
      background: #1565c0; color: #fff;
      border: none; border-radius: 6px;
      cursor: pointer; -webkit-appearance: none;
      margin: 0 0 12px; width: 100%; box-sizing: border-box;
    }
    #pdf-btn:disabled { background: #90a4ae; cursor: not-allowed; }
    #pdf-preview-btn {
      display: none;
      font-size: 15px; font-weight: bold; padding: 10px 20px;
      background: #fff; color: #1565c0;
      border: 2px solid #1565c0; border-radius: 6px;
      cursor: pointer; -webkit-appearance: none;
      margin: 0 0 6px; width: 100%; box-sizing: border-box;
    }
    #pdf-preview-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== 改ページコントロール ===== */
    .page-break-ctrl {
      position: relative; height: 0; overflow: visible;
      margin: 0; text-align: center; z-index: 5;
    }
    .pb-btn {
      position: absolute; left: 50%; transform: translateX(-50%);
      top: -13px;
      font-size: 11px; padding: 3px 12px;
      background: #f5f5f5; color: #aaa;
      border: 1px dashed #ccc; border-radius: 10px;
      cursor: pointer; -webkit-appearance: none; white-space: nowrap;
    }
    .page-break-ctrl.active .pb-btn {
      background: #fff8e1; color: #e65100;
      border: 1px solid #ffb300; font-weight: bold;
    }
    .page-break-ctrl.active::before {
      content: ''; position: absolute; left: -12px; right: -12px; top: 0;
      border-top: 3px dashed #ffb300; z-index: 4;
    }
    .page-break-ctrl.active::after {
      content: '✂ 改ページ ✂';
      position: absolute; left: 50%; top: 3px;
      transform: translateX(-50%);
      font-size: 10px; color: #e65100;
      background: #fff8e1; padding: 0 8px;
      white-space: nowrap; pointer-events: none; z-index: 6;
    }
    @media print { .page-break-ctrl { display: none !important; } }

    /* ===== 報告書ビュー ===== */
    #view-report { display: none; max-width: 720px; margin: 0 auto; padding: 0 8px 40px; }

    #view-report h1 { font-size: 22px; text-align: center; margin: 20px 0 4px; }
    #view-report .r-client { text-align: center; color: #555; margin-bottom: 20px; font-size: 15px; }

    #view-report table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    #view-report th, #view-report td { border: 1px solid #aaa; padding: 8px 10px; font-size: 15px; vertical-align: top; }
    #view-report th { background: #e8f5ec; width: 36%; white-space: nowrap; }

    #view-report .r-h2 {
      font-size: 16px; font-weight: bold;
      background: #2e7d45; color: #fff;
      padding: 8px 12px; margin: 24px 0 12px;
    }
    #view-report .r-h3 {
      font-size: 15px; color: #1a5c2a;
      border-left: 4px solid #2e7d45; padding-left: 8px;
      margin: 14px 0 6px;
    }

    #view-report .r-photos { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 12px; }
    #view-report .r-photos img { width: 140px; height: 140px; object-fit: cover; border: 1px solid #aaa; border-radius: 4px; }
    #view-report .no-photo { color: #999; font-size: 14px; margin: 4px 0 12px; }

    #view-report .r-notes {
      border: 1px solid #ccc; border-radius: 4px;
      padding: 10px 12px; background: #fafafa;
      font-size: 15px; white-space: pre-wrap; min-height: 40px;
      margin-bottom: 12px;
    }

    /* A4印刷用 */
    @media print {
      #done-banner, #back-btn { display: none !important; }
      body { padding: 0; margin: 0; }
      #view-report { max-width: 100%; padding: 0; }
      #view-report .r-h2 {
        background: #2e7d45 !important; color: #fff !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="view-login">
  <div class="login-box">
    <div class="logo">
      <span class="logo-icon" id="login-icon">🌿</span>
      <div class="logo-title">除草作業 完了報告書</div>
      <div class="logo-sub">ログインしてください</div>
    </div>
    <label for="login-pass">パスワード</label>
    <input type="password" id="login-pass" placeholder="パスワードを入力" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div id="login-error">パスワードが正しくありません</div>
  </div>
</div>

<!-- ===== 完了バナー（生成後に表示） ===== -->
<div id="done-banner">
  【完了】「📄 PDFで保存」ボタンからPDFを出力してLINEなどで共有できます
</div>

<!-- ===== フォームビュー ===== -->
<div id="view-form" style="display:none;">

  <div id="logged-user-badge"></div>
  <h1>除草作業 完了報告書</h1>

  <h2>基本情報</h2>
  <label>案件名</label>
  <input type="text" id="f-project" placeholder="例：○○住宅地 除草管理作業">

  <label>提出先（クライアント名）</label>
  <input type="text" id="f-client" placeholder="例：合同会社 SUNDAY driver &amp; co.">
  <label>作業日</label>
  <input type="date" id="f-date">
  <label>天候 / 気温</label>
  <input type="text" id="f-weather" placeholder="例：晴れ / 22℃">
  <label>作業時間帯</label>
  <div style="display:flex;align-items:center;gap:8px;">
    <input type="time" id="f-time-start" style="width:auto;flex:1;display:inline-block;">
    <span style="font-size:16px;white-space:nowrap;">〜</span>
    <input type="time" id="f-time-end" style="width:auto;flex:1;display:inline-block;">
  </div>
  <label>作業人数</label>
  <input type="text" id="f-workers" placeholder="例：3名">
  <label>担当者名（ログイン名）</label>
  <input type="text" id="f-staff" placeholder="例：山田 太郎" readonly style="background:#f0f8f0;">

  <h2>現場スペック（コピペで自動入力）</h2>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;">
    <div>
      <label style="margin:0 0 4px;font-size:14px;">① 看板写真</label>
      <div id="prev-sign" class="prev"></div>
      <input type="file" id="sign-file" accept="image/*" style="display:none"
        onchange="handleFileSelect(this,'prev-sign',1)">
      <button type="button" onclick="document.getElementById('sign-file').click()"
        style="display:block;width:100%;padding:8px 4px;font-size:12px;background:#e8f5ec;color:#1a5c2a;border:2px dashed #2e7d45;border-radius:6px;cursor:pointer;-webkit-appearance:none;box-sizing:border-box;">
        📷 選択
      </button>
    </div>
    <div>
      <label style="margin:0 0 4px;font-size:14px;">② 全景（作業前）</label>
      <div id="prev-before" class="prev"></div>
      <input type="file" id="before-file" accept="image/*" style="display:none"
        onchange="handleFileSelect(this,'prev-before',1)">
      <button type="button" onclick="document.getElementById('before-file').click()"
        style="display:block;width:100%;padding:8px 4px;font-size:12px;background:#e8f5ec;color:#1a5c2a;border:2px dashed #2e7d45;border-radius:6px;cursor:pointer;-webkit-appearance:none;box-sizing:border-box;">
        📷 選択
      </button>
    </div>
    <div>
      <label style="margin:0 0 4px;font-size:14px;">③ 全景（作業後）</label>
      <div id="prev-after" class="prev"></div>
      <input type="file" id="after-file" accept="image/*" style="display:none"
        onchange="handleFileSelect(this,'prev-after',1)">
      <button type="button" onclick="document.getElementById('after-file').click()"
        style="display:block;width:100%;padding:8px 4px;font-size:12px;background:#e8f5ec;color:#1a5c2a;border:2px dashed #2e7d45;border-radius:6px;cursor:pointer;-webkit-appearance:none;box-sizing:border-box;">
        📷 選択
      </button>
    </div>
  </div>


  <div style="background:#fffbf0;border:2px solid #f9a825;border-radius:8px;padding:12px 14px;margin:0 0 10px;font-size:15px;line-height:1.8;color:#555;">
    看板写真をタップして拡大し、文字を確認 → iPhoneの「写真」アプリで長押しコピー →<br>下の欄に貼り付けてボタンを押す
  </div>
  <textarea id="sign-paste" style="min-height:160px;font-size:16px;" placeholder="ここに貼り付ける（改行ごとに複数行OK）" onpaste="setTimeout(parsePastedText, 80)" onchange="parsePastedText()"></textarea>
  <button type="button" class="parse-btn" onclick="parsePastedText()">↓ 名称・工番・所在地に自動振り分け</button>

  <label style="margin-top:16px;">① 名称（現場名称）</label>
  <input type="text" id="f-name" placeholder="例：○○太陽光発電所">
  <label>② 工番（設備ID / 管理番号）</label>
  <input type="text" id="f-jobno" placeholder="例：JOB-2026-001">
  <label>③ 所在地（施工地・現場所在地）</label>
  <input type="text" id="f-location" placeholder="例：○○県○○市○○町1-2-3">
  <button type="button" onclick="if(confirm('写真・貼り付け欄・名称・工番・所在地をすべてクリアしますか？'))resetSiteFields()" style="margin-top:6px;padding:6px 16px;font-size:14px;background:#fff;color:#888;border:1px solid #bbb;border-radius:4px;cursor:pointer;">↺ この欄をすべてクリア</button>

  <div id="areas-container"></div>
  <button type="button" class="add-area-btn" onclick="addArea()">＋ エリアを追加</button>

  <h2>その他点検箇所</h2>
  <div id="prev-other" class="prev"></div>
  <input type="file" id="other-file" accept="image/*" multiple style="display:none"
    onchange="handleFileSelect(this,'prev-other',15)">
  <button type="button" onclick="document.getElementById('other-file').click()"
    style="display:block;width:100%;padding:12px;font-size:15px;background:#e8f5ec;color:#1a5c2a;border:2px dashed #2e7d45;border-radius:6px;cursor:pointer;-webkit-appearance:none;box-sizing:border-box;margin-bottom:6px;">
    📷 写真を選択（最大15枚）
  </button>
  <label>所見・気づいた点</label>
  <textarea id="f-other-notes" placeholder="その他点検箇所での所見を記入してください"></textarea>

  <h2>備考</h2>
  <label>備考・連絡事項</label>
  <textarea id="f-remarks" placeholder="例：散布後2時間は立入禁止"></textarea>
  <label>共有リンクURL（iCloud / Googleフォト）</label>
  <input type="text" id="f-icloud" placeholder="https://www.icloud.com/photos/... または https://photos.google.com/...">

  <!-- 生成ボタン -->
  <input type="button" class="gen-btn" value="報告書を生成" onclick="generateReport()">

</div><!-- /view-form -->


<!-- ===== 報告書ビュー（生成後に表示） ===== -->
<input type="button" id="back-btn" value="← 入力画面に戻る" onclick="backToForm()">
<input type="button" id="pdf-preview-btn" value="🔍 プレビュー" onclick="previewPdf()">
<input type="button" id="pdf-btn" value="📄 PDFで保存" onclick="generatePdf()">
<div id="view-report"></div>



<!-- ===== JavaScript ===== -->
<script>
/* =====================================================
   パスワード管理
   外注先を追加するときはここにエントリーを足すだけ：
   { pass: "パスワード", name: "表示名" }
   ===================================================== */
var USERS = [
  { pass: "1step2026", name: "管理者" }
  /* 追加例：
  ,{ pass: "gaityuu2026", name: "外注先A" }
  ,{ pass: "partner9999", name: "外注先B" }
  */
];

function buildWorkTime() {
  var s = val('f-time-start');
  var e = val('f-time-end');
  if (s && e) return s + '〜' + e;
  if (s) return s + '〜';
  if (e) return '〜' + e;
  return '';
}

/* ログイン処理 */
function doLogin() {
  var input = document.getElementById('login-pass').value;
  var matched = null;
  for (var i = 0; i < USERS.length; i++) {
    if (USERS[i].pass === input) { matched = USERS[i]; break; }
  }
  if (!matched) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }
  /* ログイン成功 */
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-form').style.display  = 'block';
  document.getElementById('f-staff').value            = matched.name;
  var badge = document.getElementById('logged-user-badge');
  badge.textContent = 'ログイン中：' + matched.name;
  badge.style.display = 'block';
  initLocalStorage();
}

/* ファイル1枚をプレビューボックスに追加 */
function addFilePreview(file, box) {
  var src = URL.createObjectURL(file);
  var wrap = document.createElement('div');
  wrap.className = 'prev-item';
  var img = document.createElement('img');
  img.src = src;
  img.title = 'タップで拡大';
  img.style.cursor = 'pointer';
  img.onclick = (function(u) { return function() { window.open(u, '_blank'); }; })(src);
  var btn = document.createElement('button');
  btn.className = 'prev-del';
  btn.textContent = '×';
  btn.onclick = function() { wrap.remove(); };
  wrap.appendChild(img);
  wrap.appendChild(btn);
  box.appendChild(wrap);
}

/* URLからプレビューを追加 */
function addUrlPreview(url, box) {
  var wrap = document.createElement('div');
  wrap.className = 'prev-item';
  var img = document.createElement('img');
  img.src = url;
  img.title = 'タップで拡大';
  img.style.cursor = 'pointer';
  img.onclick = (function(u) { return function() { window.open(u, '_blank'); }; })(url);
  var btn = document.createElement('button');
  btn.className = 'prev-del';
  btn.textContent = '×';
  btn.onclick = function() { wrap.remove(); };
  wrap.appendChild(img);
  wrap.appendChild(btn);
  box.appendChild(wrap);
}

/* URL入力欄からプレビュー追加（上限maxCount枚）
   autoExtractId: 全景写真欄が空なら1枚目を自動コピー */
function addUrlFromInput(inputId, prevId, maxCount, autoExtractId) {
  var input = document.getElementById(inputId);
  if (!input) return;
  var url = input.value.trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) {
    alert('URLはhttp://またはhttps://で始めてください');
    return;
  }
  var box = document.getElementById(prevId);
  if (!box) return;
  var current = box.querySelectorAll('.prev-item').length;
  if (current >= maxCount) {
    alert('写真は最大' + maxCount + '枚まで選択できます（現在' + current + '枚）');
    return;
  }
  var wasEmpty = (current === 0);
  addUrlPreview(url, box);
  if (wasEmpty && autoExtractId) {
    var extractBox = document.getElementById(autoExtractId);
    if (extractBox && extractBox.querySelectorAll('.prev-item').length === 0) {
      addUrlPreview(url, extractBox);
    }
  }
  input.value = '';
}

/* ファイル選択 → プレビュー追加（上限maxCount枚）
   autoExtractId: 初回追加時に全景写真欄が空なら1枚目を自動コピー */
function handleFileSelect(input, prevId, maxCount, autoExtractId) {
  var box = document.getElementById(prevId);
  if (!box) return;
  var current = box.querySelectorAll('.prev-item').length;
  var files = Array.from(input.files);
  var remaining = maxCount - current;
  if (remaining <= 0) {
    alert('写真は最大' + maxCount + '枚まで選択できます（現在' + current + '枚）');
    input.value = '';
    return;
  }
  var toAdd = files.slice(0, remaining);
  var wasEmpty = (current === 0);
  toAdd.forEach(function(file) { addFilePreview(file, box); });
  if (wasEmpty && autoExtractId && toAdd.length > 0) {
    var extractBox = document.getElementById(autoExtractId);
    if (extractBox && extractBox.querySelectorAll('.prev-item').length === 0) {
      addFilePreview(toAdd[0], extractBox);
    }
  }
  input.value = '';
}

/* ===== テキスト貼り付け → 自動振り分け ===== */

function normalizeStr(str) {
  return str
    .replace(/[Ａ-Ｚａ-ｚ０-９！-～]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) - 0xFEE0); })
    .replace(/　/g, ' ').replace(/：/g, ':').replace(/（/g, '(').replace(/）/g, ')');
}

function extractSiteInfo(rawText) {
  var text  = normalizeStr(rawText);
  var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);

  var companyRe   = /株式会社|有限会社|合同会社|支店|営業所|本社|所有者|保全管理|施工業者/;
  var nameExclude = /株式会社|有限会社|合同会社|支店|営業所|様|殿|御中|所有者|保全管理|施工業者/;
  var addressRe   = /[市区町村郡]|番地|丁目|[0-9]+番[0-9]*号/;
  /* 都道府県名または市/区/町/村で「始まる」行（先頭一致） */
  var prefStart   = /^(東京都|北海道|(?:大阪|京都)府|.{2,3}県|[市区町村])/;
  var allLabels   = /施工地|所在地|設置場所|工事場所|現場住所|住所|工事名|現場名|発電所名|施設名|名称|工番|管理番号|設備.?ID|No\.|№|番号/;

  var result = { name: null, jobno: null, location: null };

  console.log('Parse: start (' + lines.length + ' lines)');
  lines.forEach(function(l, i) { console.log('  [' + i + '] ' + l); });

  function valueAfterLabel(labelRe, excludeRe) {
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (!labelRe.test(line)) continue;
      if (excludeRe && excludeRe.test(line)) continue;
      var after = line.replace(labelRe, '').replace(/^[\s：:=　\t]+/, '').trim();
      var stop  = after.search(allLabels);
      if (stop > 0) after = after.substring(0, stop).trim();
      if (after.length > 0 && !(excludeRe && excludeRe.test(after))) {
        console.log('  Extract: same-line "' + line + '" → "' + after + '"');
        return after;
      }
      var next = lines[i + 1] || '';
      if (next && !allLabels.test(next) && !(excludeRe && excludeRe.test(next))) {
        console.log('  Extract: next-line "' + line + '" → "' + next + '"');
        return next;
      }
    }
    return null;
  }

  /* ===== 名称 ===== */
  /* 優先①: 末尾が「発電所」で終わる行 */
  for (var i = 0; i < lines.length; i++) {
    if (/発電所$/.test(lines[i]) && !nameExclude.test(lines[i])) {
      result.name = lines[i];
      console.log('Name: ' + result.name + ' (Reason: 末尾が発電所なので名称にセットしました)');
      break;
    }
  }
  /* 優先②: ラベル直後の値 */
  if (!result.name) {
    var nameRaw = valueAfterLabel(/工事名|現場名|発電所名|施設名|名称/, nameExclude);
    if (nameRaw && !nameExclude.test(nameRaw)) {
      result.name = nameRaw;
      console.log('Name: ' + result.name + ' (Reason: ラベル直後の値)');
    }
  }
  /* 優先③: スコアリングフォールバック */
  if (!result.name) {
    var nameCands = lines.filter(function(l) {
      return !nameExclude.test(l) && !companyRe.test(l) &&
             !addressRe.test(l)   && !prefStart.test(l) &&
             !(allLabels.test(l) && l.replace(allLabels, '').trim() === '') &&
             l.length > 2;
    });
    if (nameCands.length > 0) {
      nameCands.sort(function(a, b) {
        function sc(s) {
          var v = s.length;
          if (/発電所|太陽光|メガソーラー|PV/.test(s)) v += 100;
          if (/工事/.test(s)) v += 50;
          return v;
        }
        return sc(b) - sc(a);
      });
      result.name = nameCands[0];
      console.log('Name: ' + result.name + ' (Reason: スコア最高行)');
    }
  }

  /* ===== 工番① キーワードベース ===== */
  var jobRaw = valueAfterLabel(/工番|管理番号|設備.?ID|No\.|№|番号/);
  if (jobRaw) {
    var jCode = jobRaw.match(/^([A-Za-z0-9][A-Za-z0-9\-\/]*)/);
    result.jobno = jCode ? jCode[1] : jobRaw;
    console.log('JobNo: ' + result.jobno + ' (Reason: ラベル直後の英数字)');
  }
  /* ===== 工番② 日本語を含まない英数字+記号の塊をスキャン ===== */
  if (!result.jobno) {
    var dateRe = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/;
    var phoneRe = /^\d{2,4}-\d{3,4}-\d{4}$/;
    var jpRe   = /[^\x00-\x7F\-\/]/; /* 日本語文字を含む判定 */
    /* 行全体が日本語なしかつコード形式 */
    for (var ji = 0; ji < lines.length; ji++) {
      var ln = lines[ji];
      if (jpRe.test(ln)) continue; /* 日本語を含む行はスキップ */
      var codeRe = /([A-Za-z0-9][A-Za-z0-9\-\/]{2,})/g;
      var found; codeRe.lastIndex = 0;
      while ((found = codeRe.exec(ln)) !== null) {
        var c = found[1];
        if (!dateRe.test(c) && !phoneRe.test(c)) {
          result.jobno = c;
          console.log('JobNo: ' + c + ' (Reason: 日本語を含まない英数字コード from "' + ln + '")');
          break;
        }
      }
      if (result.jobno) break;
    }
  }
  /* ===== 工番③ 全行から英数混在パターンをスキャン（最終手段） ===== */
  if (!result.jobno) {
    var dateRe2  = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/;
    var phoneRe2 = /^\d{2,4}-\d{3,4}-\d{4}$/;
    var codeRe2  = /\b([A-Za-z]{1,8}[-\/]?[0-9]{2,}[A-Za-z0-9\-\/]*|[0-9]{2,}[-\/][A-Za-z][A-Za-z0-9\-\/]*|[A-Za-z]{2,}[0-9]{2,}[A-Za-z0-9\-\/]*)\b/g;
    outer:
    for (var li = 0; li < lines.length; li++) {
      var f2; codeRe2.lastIndex = 0;
      while ((f2 = codeRe2.exec(lines[li])) !== null) {
        var c2 = f2[1];
        if (c2.length >= 3 && !dateRe2.test(c2) && !phoneRe2.test(c2)) {
          result.jobno = c2;
          console.log('JobNo: ' + c2 + ' (Reason: 英数混在コード from "' + lines[li] + '")');
          break outer;
        }
      }
    }
  }

  /* ===== 所在地① ラベルマッチ ===== */
  var locRaw = valueAfterLabel(/施工地|所在地|設置場所|工事場所|現場住所|住所/, companyRe);
  if (locRaw && !companyRe.test(locRaw) && locRaw !== result.name) {
    result.location = locRaw;
    console.log('Location: ' + result.location + ' (Reason: ラベル直後の値)');
  }
  /* ===== 所在地②【消去法】都道府県名 or 市/区/町/村から始まり、末尾が「発電所」でない行 ===== */
  if (!result.location) {
    for (var k = 0; k < lines.length; k++) {
      var kl = lines[k];
      if (!prefStart.test(kl)) continue;       /* 地名始点でない → スキップ */
      if (/発電所$/.test(kl)) continue;         /* 末尾が発電所 → 名称なのでスキップ */
      if (companyRe.test(kl)) continue;         /* 会社名を含む → スキップ */
      if (kl === result.name) continue;          /* 既に名称として採用済み → スキップ */
      result.location = kl;
      console.log('Location: ' + result.location + ' (Reason: 地名から始まり発電所で終わらないため所在地と判断しました)');
      break;
    }
  }
  /* ===== 所在地③ 市区町村・番地フォールバック ===== */
  if (!result.location) {
    for (var m = 0; m < lines.length; m++) {
      var al = lines[m];
      if (addressRe.test(al) && !companyRe.test(al) && al !== result.name) {
        result.location = al;
        console.log('Location: ' + result.location + ' (Reason: 市/町/番地を含む行)');
        break;
      }
    }
  }

  console.log('Result: ' + JSON.stringify(result));
  return result;
}

function setField(id, value) {
  var el = document.getElementById(id);
  if (!el || !value) return;
  el.value = value;
  el.dispatchEvent(new Event('input'));
  el.classList.add('field-highlight');
  setTimeout(function() { el.classList.remove('field-highlight'); }, 2500);
}

function parsePastedText() {
  var ta   = document.getElementById('sign-paste');
  var text = ta.value;
  if (!text.trim() || text.indexOf('✅') === 0 || text.indexOf('⚠️') === 0) return;

  var result = extractSiteInfo(text);
  var filled = [], missing = [];

  if (result.name)     { setField('f-name',     result.name);     filled.push('名称'); }
  else                 { missing.push('名称'); }
  if (result.jobno)    { setField('f-jobno',     result.jobno);    filled.push('工番'); }
  else                 { missing.push('工番'); }
  if (result.location) { setField('f-location',  result.location); filled.push('所在地'); }
  else                 { missing.push('所在地'); }

  if (filled.length > 0 && missing.length === 0) {
    ta.value = '✅ ' + filled.join('・') + ' を反映しました';
  } else if (filled.length > 0) {
    ta.value = '✅ ' + filled.join('・') + ' を反映 ／ ⚠️ ' + missing.join('・') + ' は手入力してください';
  } else {
    ta.value = '⚠️ 自動判別できませんでした。各欄を手入力してください。';
  }
  setTimeout(function() {
    var v = ta.value;
    if (v.indexOf('✅') === 0 || v.indexOf('⚠️') === 0) ta.value = '';
  }, 4000);
}

/* ===== localStorage 自動保存・読み込み ===== */
var SAVE_MAP = { 'f-name': 'site_name', 'f-jobno': 'site_jobno', 'f-location': 'site_location' };

function initLocalStorage() {
  Object.keys(SAVE_MAP).forEach(function(id) {
    var el  = document.getElementById(id);
    var key = SAVE_MAP[id];
    var saved = localStorage.getItem(key);
    if (saved && el) el.value = saved;
    if (el) {
      el.addEventListener('input', function() {
        localStorage.setItem(key, el.value);
      });
    }
  });
}

/* ===== データ一元管理：報告書データ構造 ===== */
function buildReportData() {
  var areaBlocks = document.querySelectorAll('#areas-container [id^="area-block-"]');
  var areas = [];
  areaBlocks.forEach(function(block) {
    var k = block.id.replace('area-block-', '');
    areas.push({
      areaId:          k,
      photosBefore:    document.querySelectorAll('#prev-fi' + k + 'b .prev-item img').length,
      photosAfter:     document.querySelectorAll('#prev-fi' + k + 'a .prev-item img').length,
      photosHerb:      document.querySelectorAll('#prev-fi' + k + 'h .prev-item img').length,
      photosAbnormal:  document.querySelectorAll('#prev-fi' + k + 'n .prev-item img').length,
      notes:           val('notes-' + k)
    });
  });
  return {
    generatedAt: new Date().toISOString(),
    project:     val('f-project'),
    siteName:    val('f-name'),
    jobNo:       val('f-jobno'),
    location:    val('f-location'),
    client:      val('f-client'),
    date:        val('f-date'),
    weather:     val('f-weather'),
    workTime:    buildWorkTime(),
    workers:     val('f-workers'),
    staff:       val('f-staff'),
    areas:       areas,
    otherPhotos: document.querySelectorAll('#prev-other .prev-item img').length,

  };

/* ===== Google Sheets 送信（土台） =====
   本番化する際は SHEET_URL にGASのデプロイURLを設定する。
   GAS側: doPost(e) { var d = JSON.parse(e.postData.contents); ... }
   ================================================= */
function sendToSpreadsheet(data) {
  var SHEET_URL = ''; /* ← GASデプロイURLをここに貼り付け */
  console.log('[Sheets送信データ]', JSON.stringify(data, null, 2));
  if (!SHEET_URL) return;
  fetch(SHEET_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  }).catch(function(e) { console.warn('[Sheets送信失敗]', e); });
}

  h += '<div class="r-notes">' + (val('f-other-notes') || '（記載なし）') + '</div>';
  h += pbCtrl('other');

  h += '<div class="r-h2">5. 備考・連絡事項</div>';
  h += '<div class="r-notes">' + (val('f-remarks') || '特になし') + '</div>';

  var iu = val('f-icloud');
  if (iu) {
    h += '<div style="margin:16px 0;padding:12px;border:1px solid #2e7d45;border-radius:6px;">';
    h += '<b>共有リンク：</b><br>';
    h += '<a href="' + iu + '" style="color:#1a5c2a;word-break:break-all;">' + iu + '</a>';
    h += '</div>';
  }
  h += pbCtrl('remarks');

  h += '<div style="text-align:right;margin-top:32px;font-size:14px;color:#555;">担当者：' + st + '</div>';
  h += '<p style="text-align:center;color:#bbb;font-size:13px;margin-top:24px;">以上</p>';

  document.getElementById('view-form').style.display   = 'none';
  document.getElementById('view-report').style.display = 'block';
  document.getElementById('done-banner').style.display = 'block';
  document.getElementById('back-btn').style.display        = 'block';
  document.getElementById('pdf-preview-btn').style.display = 'block';
  document.getElementById('pdf-btn').style.display         = 'block';
  window.scrollTo(0, 0);
}

/* ===== PDF生成 ===== */

/* 改ページコントロール HTML 生成 */
function pbCtrl(id) {
  return '<div class="page-break-ctrl" id="pb-' + id + '">' +
    '<button type="button" class="pb-btn" onclick="togglePageBreak(\'' + id + '\')">' +
    'ここで改ページ</button></div>';
}

/* 改ページトグル */
function togglePageBreak(id) {
  var el = document.getElementById('pb-' + id);
  if (!el) return;
  var nowActive = !el.classList.contains('active');
  el.classList.toggle('active');
  var btn = el.querySelector('.pb-btn');
  if (btn) btn.textContent = nowActive ? 'ここで改ページ（タップで解除）' : 'ここで改ページ';
  _pdfCanvas = null;
}

/* キャッシュ済みcanvas */
var _pdfCanvas = null;

/* jsPDF・html2canvas をクリック時に動的ロード */
function loadPdfLibs() {
  if (window.html2canvas && window.jspdf) return Promise.resolve();
  function loadScript(src) {
    return new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = function() { reject(new Error('読み込み失敗: ' + src)); };
      document.head.appendChild(s);
    });
  }
  return loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
    .then(function() {
      return loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
    });
}

/* PDF オブジェクトを構築して返す（preview / save 共通） */
async function buildPdf(statusCb) {
  var reportEl = document.getElementById('view-report');
  /* A4換算の固定キャプチャ幅。スマホでは reportEl がビューポート幅で
     描画されるため pxToMm がデバイスごとに変わり、ページ境界がズレる。
     常に720px固定でレイアウト→キャプチャすることで機種差をなくす。 */
  var PDF_W = 720;

  await loadPdfLibs();
  if (statusCb) statusCb('PDF生成中...');

  /* ① A4換算の固定幅を強制適用してリフロー待ち */
  var savedW    = reportEl.style.width;
  var savedMinW = reportEl.style.minWidth;
  var savedMaxW = reportEl.style.maxWidth;
  reportEl.style.width    = PDF_W + 'px';
  reportEl.style.minWidth = PDF_W + 'px';
  reportEl.style.maxWidth = PDF_W + 'px';

  window.scrollTo(0, 0);
  await new Promise(function(r) { setTimeout(r, 200); });

  /* ② canvas キャプチャ前に位置を計測
        html2canvas はキャプチャ中にスクロールを変えるため、
        キャプチャ後に getBoundingClientRect() を呼ぶと座標がズレる */
  var contRect = reportEl.getBoundingClientRect();

  var breakYsPx = [];
  reportEl.querySelectorAll('.page-break-ctrl.active').forEach(function(el) {
    var r = el.getBoundingClientRect();
    var relY = r.top - contRect.top;
    if (relY > 0) breakYsPx.push(relY);
  });
  breakYsPx.sort(function(a, b) { return a - b; });

  var linkData = [];
  reportEl.querySelectorAll('a[href]').forEach(function(a) {
    var url = a.href;
    if (!url || url.indexOf('javascript') === 0) return;
    var ar = a.getBoundingClientRect();
    linkData.push({
      url:  url,
      relX: ar.left - contRect.left,
      relY: ar.top  - contRect.top,
      w:    Math.max(a.offsetWidth,  10),
      h:    Math.max(a.offsetHeight,  5)
    });
  });

  /* ③ pb-btn を非表示にしてキャプチャ */
  var pbBtns = reportEl.querySelectorAll('.pb-btn');
  pbBtns.forEach(function(b) { b.style.visibility = 'hidden'; });

  var SCALE = 2;
  if (!_pdfCanvas) {
    _pdfCanvas = await html2canvas(reportEl, {
      scale:           SCALE,
      useCORS:         true,
      allowTaint:      true,
      logging:         false,
      backgroundColor: '#ffffff',
      windowWidth:     PDF_W   /* メディアクエリなどにも一貫した幅を渡す */
    });
  }
  var canvas = _pdfCanvas;

  pbBtns.forEach(function(b) { b.style.visibility = ''; });

  /* ④ キャプチャ完了後にスタイルを元に戻す */
  reportEl.style.width    = savedW;
  reportEl.style.minWidth = savedMinW;
  reportEl.style.maxWidth = savedMaxW;

  /* ⑤ jsPDF 初期化 */
  var jsPDF  = window.jspdf.jsPDF;
  var pdf    = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  var pageW  = pdf.internal.pageSize.getWidth();   /* 210mm */
  var pageH  = pdf.internal.pageSize.getHeight();  /* 297mm */
  var margin = 10;
  var contW  = pageW - margin * 2;  /* 190mm */
  var contH  = pageH - margin * 2;  /* 277mm */

  var cssW     = canvas.width  / SCALE;  /* CSS幅px */
  var cssH     = canvas.height / SCALE;  /* CSS高px */
  var pxToMm   = contW / cssW;           /* px→mm変換率 */
  var totalHmm = cssH * pxToMm;

  /* ⑥ 改ページ位置をmmに変換してページスライス一覧を生成
        改ページボタンの位置でセクションを区切り、
        各セクションが A4 を超える場合は自然に複数ページに分割する */
  var breakYsMm = breakYsPx.map(function(py) { return py * pxToMm; });

  var sectionStarts = [0].concat(breakYsMm);
  var pageSlices = [];  /* [{ startMm, endMm }] */

  for (var si = 0; si < sectionStarts.length; si++) {
    var secStart = sectionStarts[si];
    var secEnd   = (si + 1 < sectionStarts.length) ? sectionStarts[si + 1] : totalHmm;
    var secH     = secEnd - secStart;
    var numPg    = Math.max(1, Math.ceil(secH / contH));
    for (var p = 0; p < numPg; p++) {
      pageSlices.push({
        startMm: secStart + p * contH,
        endMm:   Math.min(secStart + (p + 1) * contH, secEnd)
      });
    }
  }

  /* ⑦ 各ページを canvas のスライスで描画（フル画像オフセットではなく切り出し） */
  for (var pi = 0; pi < pageSlices.length; pi++) {
    if (pi > 0) pdf.addPage();
    var ps   = pageSlices[pi];
    var srcY = Math.round(ps.startMm / pxToMm * SCALE);
    var srcH = Math.round((ps.endMm - ps.startMm) / pxToMm * SCALE);
    if (srcH < 1) srcH = 1;

    var sc  = document.createElement('canvas');
    sc.width  = canvas.width;
    sc.height = srcH;
    var ctx   = sc.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, sc.width, sc.height);
    ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);

    var sliceHmm = (srcH / SCALE) * pxToMm;
    pdf.addImage(sc.toDataURL('image/jpeg', 0.85), 'JPEG', margin, margin, contW, sliceHmm);
  }

  /* ⑧ 共有リンクURLをクリッカブルアノテーションとして追加 */
  linkData.forEach(function(ld) {
    var lxMm = margin + ld.relX * pxToMm;
    var lyMm = ld.relY * pxToMm;
    var lwMm = ld.w * pxToMm;
    var lhMm = ld.h * pxToMm;

    for (var pi = 0; pi < pageSlices.length; pi++) {
      var ps = pageSlices[pi];
      if (lyMm >= ps.startMm && lyMm < ps.endMm) {
        pdf.setPage(pi + 1);
        pdf.link(lxMm, margin + (lyMm - ps.startMm), lwMm, lhMm, { url: ld.url });
        break;
      }
    }
  });

  return pdf;
}

/* プレビュー：BlobURLを新タブで開く */
async function previewPdf() {
  var preBtn = document.getElementById('pdf-preview-btn');
  var pdfBtn = document.getElementById('pdf-btn');
  preBtn.disabled = true;
  pdfBtn.disabled = true;
  preBtn.value = 'プレビュー生成中...';
  try {
    var pdf = await buildPdf(function(msg) { preBtn.value = msg; });
    var blob = pdf.output('blob');
    var url  = URL.createObjectURL(blob);
    window.open(url, '_blank');
  } catch (e) {
    console.error('プレビューエラー:', e);
    alert('プレビュー生成に失敗しました。\nネットワーク接続を確認してください。');
  } finally {
    preBtn.disabled = false;
    pdfBtn.disabled = false;
    preBtn.value = '🔍 プレビュー';
  }
}

async function generatePdf() {
  var pdfBtn = document.getElementById('pdf-btn');
  var preBtn = document.getElementById('pdf-preview-btn');
  pdfBtn.disabled = true;
  preBtn.disabled = true;
  pdfBtn.value = '読み込み中...';
  try {
    var pdf = await buildPdf(function(msg) { pdfBtn.value = msg; });
    var proj  = val('f-project') || '報告書';
    var dt    = val('f-date')    || '';
    var fname = (proj + (dt ? '_' + dt : '') + '.pdf')
                  .replace(/[\\/:*?"<>|]/g, '_');
    pdf.save(fname);
  } catch (e) {
    console.error('PDF生成エラー:', e);
    alert('PDF生成に失敗しました。\nネットワーク接続を確認してください。');
  } finally {
    pdfBtn.disabled = false;
    preBtn.disabled = false;
    pdfBtn.value = '📄 PDFで保存';
  }
}

/* ===== PWA ホーム画面アイコンを Canvas で生成 ===== */
(function() {
  try {
    var c   = document.createElement('canvas');
    c.width = 180; c.height = 180;
    var ctx = c.getContext('2d');

    var r = 36;
    ctx.fillStyle = '#1a5c2a';
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(180 - r, 0);
    ctx.quadraticCurveTo(180, 0,   180, r);
    ctx.lineTo(180, 180 - r);
    ctx.quadraticCurveTo(180, 180, 180 - r, 180);
    ctx.lineTo(r, 180);
    ctx.quadraticCurveTo(0, 180,   0, 180 - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0,     r, 0);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle    = '#a8d5b0';
    ctx.font         = 'bold 80px sans-serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('草', 90, 110);

    ctx.fillStyle = '#ffffff';
    ctx.font      = 'bold 26px sans-serif';
    ctx.fillText('報告書', 90, 158);

    var link = document.getElementById('touch-icon');
    if (link) link.href = c.toDataURL('image/png');
  } catch(e) {}
})();
